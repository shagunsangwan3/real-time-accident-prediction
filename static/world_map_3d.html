<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>🌍 Real-Time Accident Risk Globe</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html,body{width:100%;height:100%;background:#000408;color:#e0f0ff;
      font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;}
    #globe-canvas{position:fixed;inset:0;display:block;
      width:100%!important;height:100%!important;cursor:crosshair;}

    /* ── COUNTRY LABELS on globe ── */
    .country-label{
      position:fixed;
      pointer-events:none;
      transform:translate(-50%,-50%);
      font-size:.62rem;
      font-weight:700;
      letter-spacing:.06em;
      text-transform:uppercase;
      color:rgba(180,220,255,0.82);
      text-shadow:0 0 8px rgba(0,100,200,.9),0 0 16px rgba(0,60,140,.7);
      white-space:nowrap;
      transition:opacity .15s;
      z-index:15;
      user-select:none;
    }
    .country-label.hl-high { color:rgba(255,100,130,.92); text-shadow:0 0 8px rgba(255,40,80,.8),0 0 16px rgba(180,0,40,.6); }
    .country-label.hl-med  { color:rgba(255,200,80,.92);  text-shadow:0 0 8px rgba(255,150,0,.8),0 0 16px rgba(180,100,0,.6); }
    .country-label.hl-low  { color:rgba(80,255,160,.92);  text-shadow:0 0 8px rgba(0,200,100,.8),0 0 16px rgba(0,120,60,.6); }
    .country-label .flag   { font-size:.82rem; margin-right:3px; }

    /* click ripple on globe */
    #click-ripple{
      position:fixed;pointer-events:none;z-index:25;
      width:48px;height:48px;margin:-24px 0 0 -24px;
      border-radius:50%;border:2px solid rgba(80,180,255,.8);
      display:none;animation:ripple-anim .55s ease-out forwards;
    }
    @keyframes ripple-anim{
      0%  {transform:scale(.3);opacity:1;}
      100%{transform:scale(2.8);opacity:0;}
    }

    /* ── HUD SHELL ── */
    #hud{position:fixed;inset:0;pointer-events:none;z-index:20;}

    /* Title */
    #title-bar{
      position:absolute;top:0;left:0;right:0;padding:14px 24px;
      display:flex;align-items:center;gap:12px;
      background:linear-gradient(to bottom,rgba(0,4,10,.93) 60%,transparent);
      pointer-events:auto;
    }
    #title-bar h1{font-size:1.15rem;font-weight:700;letter-spacing:.05em;
      color:#a8d8f4;text-shadow:0 0 20px rgba(80,180,255,.65);}
    .pulse-dot{width:9px;height:9px;border-radius:50%;background:#22ff88;flex-shrink:0;
      box-shadow:0 0 10px #22ff88,0 0 22px #22ff88;animation:pulse 1.5s ease-in-out infinite;}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}

    #breadcrumb{
      margin-left:auto;display:none;align-items:center;gap:10px;
      font-size:.78rem;color:#7ab8d8;
    }
    #bc-country{color:#c8e8ff;font-weight:700;font-size:.9rem;}
    #btn-back{
      background:rgba(80,180,255,.13);border:1px solid rgba(80,180,255,.35);
      color:#7ab8d8;border-radius:8px;padding:5px 13px;font-size:.73rem;
      cursor:pointer;pointer-events:auto;letter-spacing:.04em;transition:all .2s;
    }
    #btn-back:hover{background:rgba(80,180,255,.25);color:#c8e8ff;}

    /* hint bar */
    #hint{
      position:absolute;bottom:38px;left:50%;transform:translateX(-50%);
      font-size:.7rem;color:rgba(100,165,210,.45);letter-spacing:.08em;
      white-space:nowrap;pointer-events:none;
    }
    #hint strong{color:rgba(140,200,240,.7);}

    /* ── Legend ── */
    #legend{
      position:absolute;top:68px;right:24px;
      background:rgba(0,8,20,.82);border:1px solid rgba(80,180,255,.2);
      border-radius:14px;padding:13px 18px;backdrop-filter:blur(14px);
      pointer-events:auto;min-width:158px;
    }
    #legend h3{font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;
      color:#5ab4e0;margin-bottom:10px;}
    .legend-row{display:flex;align-items:center;gap:9px;margin-bottom:7px;}
    .legend-row:last-child{margin-bottom:0;}
    .ld{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
    .ld-low{background:#22ff88;box-shadow:0 0 7px #22ff88;}
    .ld-med{background:#ffaa00;box-shadow:0 0 7px #ffaa00;}
    .ld-high{background:#ff3366;box-shadow:0 0 7px #ff3366;}
    .legend-row span{font-size:.77rem;color:#aac8e0;}
    .lc{margin-left:auto;font-size:.72rem;font-weight:700;font-variant-numeric:tabular-nums;}
    .sv-low{color:#22ff88;}.sv-med{color:#ffaa00;}.sv-high{color:#ff3366;}

    /* ── Stats ── */
    #stats{
      position:absolute;top:68px;left:24px;
      background:rgba(0,8,20,.82);border:1px solid rgba(80,180,255,.2);
      border-radius:14px;padding:13px 18px;backdrop-filter:blur(14px);
      min-width:190px;pointer-events:auto;
    }
    #stats h3{font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;
      color:#5ab4e0;margin-bottom:10px;}
    .stat-row{display:flex;justify-content:space-between;margin-bottom:6px;font-size:.77rem;}
    .stat-row:last-child{margin-bottom:0;}
    .stat-label{color:#6a9cb8;}
    .stat-val{color:#c8e8ff;font-weight:600;font-variant-numeric:tabular-nums;}
    .sv-live{color:#22ff88;}

    /* ── Country detail card ── */
    #country-card{
      position:absolute;bottom:38px;left:50%;transform:translateX(-50%);
      background:rgba(0,8,22,.90);border:1px solid rgba(80,180,255,.25);
      border-radius:16px;backdrop-filter:blur(18px);padding:16px 24px;
      min-width:340px;max-width:520px;pointer-events:auto;display:none;
      box-shadow:0 12px 40px rgba(0,0,0,.6);
    }
    #cc-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
    #cc-flag{font-size:1.6rem;}
    #cc-name{font-size:1.05rem;font-weight:700;color:#c8e8ff;}
    #cc-sub{font-size:.67rem;color:#5ab4e0;letter-spacing:.1em;text-transform:uppercase;}
    #cc-body{display:flex;gap:20px;align-items:center;}
    .cc-stat{text-align:center;flex:1;}
    .cc-num{font-size:1.25rem;font-weight:700;font-variant-numeric:tabular-nums;}
    .cc-lbl{font-size:.62rem;color:#6a9cb8;letter-spacing:.06em;text-transform:uppercase;margin-top:2px;}
    #cc-bar-wrap{flex:1.5;}
    #cc-bar-lbl{font-size:.62rem;color:#5ab4e0;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;}
    #cc-bar{display:flex;height:9px;border-radius:5px;overflow:hidden;gap:2px;}
    .cc-seg{height:100%;border-radius:3px;transition:width .7s cubic-bezier(.4,0,.2,1);}

    /* ── Tooltip (hover on dot) ── */
    #tooltip{position:fixed;display:none;background:rgba(0,8,24,.92);
      border:1px solid rgba(80,180,255,.3);border-radius:11px;padding:10px 15px;
      font-size:.77rem;pointer-events:none;backdrop-filter:blur(10px);z-index:30;min-width:180px;}
    #tt-risk{font-weight:700;font-size:.92rem;margin-bottom:4px;}
    #tt-coord{color:#7ab0cc;font-size:.71rem;margin-bottom:5px;}
    #tt-extra{color:#aac8e0;font-size:.73rem;line-height:1.6;}

    /* ── Ticker ── */
    #ticker{position:absolute;bottom:0;left:0;right:0;height:33px;
      background:rgba(0,4,10,.93);border-top:1px solid rgba(80,180,255,.12);
      display:flex;align-items:center;overflow:hidden;}
    #ticker-lbl{flex-shrink:0;padding:0 13px;font-size:.66rem;letter-spacing:.12em;
      color:#5ab4e0;text-transform:uppercase;border-right:1px solid rgba(80,180,255,.17);
      height:100%;display:flex;align-items:center;}
    #ticker-track{flex:1;overflow:hidden;}
    #ticker-inner{display:flex;gap:55px;white-space:nowrap;font-size:.68rem;
      color:#8ab8d0;animation:scroll 30s linear infinite;}
    @keyframes scroll{0%{transform:translateX(100%)}100%{transform:translateX(-200%)}}
    .ti{display:flex;align-items:center;gap:6px;}
    .td{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

    #scanline{position:fixed;inset:0;pointer-events:none;z-index:5;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.02) 2px,rgba(0,0,0,.02) 4px);}

    #loading{position:fixed;inset:0;background:#000408;display:flex;
      flex-direction:column;align-items:center;justify-content:center;
      z-index:100;transition:opacity .5s ease;}
    #loading.out{opacity:0;pointer-events:none;}
    .ring{width:52px;height:52px;border:3px solid rgba(80,180,255,.14);
      border-top-color:#5ab4e0;border-radius:50%;animation:spin .9s linear infinite;margin-bottom:18px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    #loading p{color:#5ab4e0;font-size:.82rem;letter-spacing:.1em;}
  </style>
</head>
<body>
<canvas id="globe-canvas"></canvas>
<div id="scanline"></div>
<div id="click-ripple"></div>

<div id="loading"><div class="ring"></div><p>BUILDING GLOBE…</p></div>

<div id="hud">
  <!-- Title bar -->
  <div id="title-bar">
    <div class="pulse-dot"></div>
    <h1 id="main-title">Real-Time Accident Risk · Global View</h1>
    <div id="breadcrumb">
      <span id="bc-country"></span>
      <button id="btn-back">← World View</button>
    </div>
  </div>

  <!-- Legend -->
  <div id="legend">
    <h3>Risk Level</h3>
    <div class="legend-row"><div class="ld ld-low"></div><span>Low</span><span class="lc sv-low" id="lc-low">—</span></div>
    <div class="legend-row"><div class="ld ld-med"></div><span>Medium</span><span class="lc sv-med" id="lc-med">—</span></div>
    <div class="legend-row"><div class="ld ld-high"></div><span>High</span><span class="lc sv-high" id="lc-high">—</span></div>
  </div>

  <!-- Stats -->
  <div id="stats">
    <h3>Live Stats</h3>
    <div class="stat-row"><span class="stat-label">Active Events</span><span class="stat-val sv-live" id="s-active">—</span></div>
    <div class="stat-row"><span class="stat-label">High Risk</span><span class="stat-val sv-high" id="s-high">—</span></div>
    <div class="stat-row"><span class="stat-label">Medium Risk</span><span class="stat-val sv-med" id="s-med">—</span></div>
    <div class="stat-row"><span class="stat-label">Low Risk</span><span class="stat-val sv-low" id="s-low">—</span></div>
  </div>

  <!-- Country card (bottom center, appears on click) -->
  <div id="country-card">
    <div id="cc-head">
      <div id="cc-flag"></div>
      <div><div id="cc-name"></div><div id="cc-sub">Accident Risk Analysis</div></div>
    </div>
    <div id="cc-body">
      <div class="cc-stat"><div class="cc-num sv-high" id="cc-high">—</div><div class="cc-lbl">High</div></div>
      <div class="cc-stat"><div class="cc-num sv-med"  id="cc-med">—</div><div class="cc-lbl">Medium</div></div>
      <div class="cc-stat"><div class="cc-num sv-low"  id="cc-low">—</div><div class="cc-lbl">Low</div></div>
      <div id="cc-bar-wrap">
        <div id="cc-bar-lbl">Distribution</div>
        <div id="cc-bar">
          <div class="cc-seg" id="cc-seg-h" style="background:#ff3366;width:33%"></div>
          <div class="cc-seg" id="cc-seg-m" style="background:#ffaa00;width:33%"></div>
          <div class="cc-seg" id="cc-seg-l" style="background:#22ff88;width:34%"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="hint"><strong>Drag</strong> to rotate &nbsp;·&nbsp; <strong>Scroll</strong> to zoom &nbsp;·&nbsp; <strong>Click any country</strong> to drill in</div>

  <!-- dot tooltip -->
  <div id="tooltip">
    <div id="tt-risk"></div>
    <div id="tt-coord"></div>
    <div id="tt-extra"></div>
  </div>

  <!-- ticker -->
  <div id="ticker">
    <div id="ticker-lbl">Live Feed</div>
    <div id="ticker-track"><div id="ticker-inner">Loading…</div></div>
  </div>
</div>

/* ── Earth texture ── */
const RADIUS=1.0;

function mkEarthTex(){
  const S=1024,tc=document.createElement('canvas');tc.width=S;tc.height=S/2;
  const tx=tc.getContext('2d');
  const g=tx.createLinearGradient(0,0,0,S/2);
  g.addColorStop(0,'#0a2240');g.addColorStop(.5,'#0d2e52');g.addColorStop(1,'#06192e');
  tx.fillStyle=g;tx.fillRect(0,0,S,S/2);
  const W2=S,H2=S/2;
  const ll=(lat,lng)=>[(lng+180)/360*W2,(90-lat)/180*H2];
  const poly=(pts,fill)=>{tx.beginPath();const[sx,sy]=pts[0];tx.moveTo(sx,sy);
    pts.slice(1).forEach(([x,y])=>tx.lineTo(x,y));tx.closePath();tx.fillStyle=fill;tx.fill();};
  const L='#1a4530';
  poly([ll(70,-140),ll(70,-60),ll(50,-55),ll(25,-80),ll(20,-87),ll(15,-90),ll(8,-77),ll(8,-82),ll(30,-117),ll(50,-125),ll(60,-140)],L);
  poly([ll(12,-73),ll(12,-60),ll(0,-50),ll(-10,-37),ll(-35,-57),ll(-55,-67),ll(-55,-72),ll(-40,-73),ll(-20,-70),ll(0,-78)],L);
  poly([ll(71,20),ll(71,30),ll(55,30),ll(45,35),ll(36,28),ll(36,10),ll(43,-9),ll(50,-5),ll(58,-5),ll(58,15),ll(65,15)],L);
  poly([ll(37,10),ll(37,35),ll(20,55),ll(10,45),ll(-10,40),ll(-35,26),ll(-34,18),ll(-20,13),ll(0,8),ll(10,-18),ll(20,-17)],L);
  poly([ll(71,30),ll(71,180),ll(60,160),ll(50,145),ll(35,140),ll(20,120),ll(1,104),ll(8,77),ll(22,68),ll(25,57),ll(12,43),ll(37,35),ll(45,35),ll(55,30)],L);
  poly([ll(-15,130),ll(-12,136),ll(-15,145),ll(-25,153),ll(-38,145),ll(-38,140),ll(-32,116),ll(-22,114)],L);
  poly([ll(83,-45),ll(83,-15),ll(72,-22),ll(60,-46),ll(60,-52),ll(70,-55)],L);
  tx.globalAlpha=.06;
  for(let i=0;i<1600;i++){const x=Math.random()*S,y=Math.random()*S/2;
    tx.beginPath();tx.arc(x,y,Math.random()*2.5+.5,0,Math.PI*2);
    tx.fillStyle=`hsl(${200+Math.random()*40},${50+Math.random()*30}%,${20+Math.random()*20}%)`;tx.fill();}
  tx.globalAlpha=1;
  const iN=tx.createRadialGradient(S/2,0,0,S/2,0,S*.12);
  iN.addColorStop(0,'rgba(200,230,255,.88)');iN.addColorStop(1,'rgba(180,220,255,0)');
  tx.fillStyle=iN;tx.fillRect(0,0,S,S/2);
  const iS=tx.createRadialGradient(S/2,S/2,0,S/2,S/2,S*.09);
  iS.addColorStop(0,'rgba(200,230,255,.82)');iS.addColorStop(1,'rgba(180,220,255,0)');
  tx.fillStyle=iS;tx.fillRect(0,0,S,S/2);
  return new THREE.CanvasTexture(tc);
}

    fragmentShader:`varying vec3 vN;void main(){float r=pow(1.-abs(dot(vN,vec3(0,0,1))),${fs});gl_FragColor=vec4(.12,.45,.85,r*${op});}`,
    side:sides,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending}));

  const ll3=(lat,lng,r)=>{const ph=(90-lat)*Math.PI/180,th=(lng+180)*Math.PI/180;
    return new THREE.Vector3(-r*Math.sin(ph)*Math.cos(th),r*Math.cos(ph),r*Math.sin(ph)*Math.sin(th));};

/* ══ LAT/LNG HELPERS ════════════════════════════════════════ */
function ll3d(lat,lng,r){
  const ph=(90-lat)*Math.PI/180,th=(lng+180)*Math.PI/180;
  return new THREE.Vector3(-r*Math.sin(ph)*Math.cos(th),r*Math.cos(ph),r*Math.sin(ph)*Math.sin(th));
}

/* Project a 3D world point → screen {x,y}, return null if behind globe */
function project(pos3d){
  // pos3d is in WORLD space (after earth rotation applied externally)
  const v=pos3d.clone().project(camera);
  /* backface cull: dot of camera-to-point with the point's normal */
  const camDir=new THREE.Vector3().subVectors(camera.position,pos3d).normalize();
  const norm=pos3d.clone().normalize();
  if(norm.dot(camDir)<0.08)return null; // behind or on limb
  return {x:(v.x*.5+.5)*W(), y:(-.5*v.y+.5)*H()};
}

/* ══ COUNTRY LABELS (HTML divs projected onto sphere) ════════ */
const labelEls={}; // name→div

COUNTRIES.forEach(c=>{
  const div=document.createElement('div');
  div.className='country-label hl-'+c.risk.toLowerCase();
  div.innerHTML=`<span class="flag">${c.flag}</span>${c.name}`;
  div.title=c.name;
  document.body.appendChild(div);
  labelEls[c.name]=div;
  // store the 3D "label position" in local earth coords
  c._localPos = ll3d(c.lat,c.lng,RADIUS+.012);
});

function updateLabelPositions(){
  COUNTRIES.forEach(c=>{
    const worldPos = c._localPos.clone().applyEuler(earthMesh.rotation);
    const screen   = project(worldPos);
    const div      = labelEls[c.name];
    if(screen){
      div.style.left=screen.x+'px';
      div.style.top =screen.y+'px';
      div.style.display='block';
      // fade near limb
      const norm=worldPos.clone().normalize();
      const camDir=new THREE.Vector3().subVectors(camera.position,worldPos).normalize();
      const dot=norm.dot(camDir);
      div.style.opacity=Math.max(0,Math.min(1,(dot-.1)/.35));
      // zoom-based size
      const zFactor=Math.max(.7,Math.min(1.4,2.6/camera.position.z));
      div.style.fontSize=(0.6*zFactor)+'rem';
    } else {
      div.style.display='none';
    }
  });
}

/* ══ RISK EVENT DOTS ══════════════════════════════════════════ */
const RCOL={HIGH:0xff3366,MEDIUM:0xffaa00,LOW:0x22ff88};
const RHEX={HIGH:'#ff3366',MEDIUM:'#ffaa00',LOW:'#22ff88'};

function mkGlowTex(col){
  const s=64,tc=document.createElement('canvas');tc.width=s;tc.height=s;
  const tx=tc.getContext('2d'),g=tx.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
  const h='#'+col.toString(16).padStart(6,'0');
  g.addColorStop(0,h+'ff');g.addColorStop(.3,h+'aa');g.addColorStop(.65,h+'33');g.addColorStop(1,h+'00');
  tx.fillStyle=g;tx.fillRect(0,0,s,s);return new THREE.CanvasTexture(tc);
}

class RiskEvent{
  constructor(lat,lng,risk){
    this.lat=lat;this.lng=lng;this.risk=risk;
    this.temp=(Math.random()*55+32).toFixed(1);
    this.wind=(Math.random()*40).toFixed(1);
    this.visib=(Math.random()*9+1).toFixed(1);
    this.ttl=12000+Math.random()*16000;
    this.born=Date.now()-Math.random()*8000;
    this.alpha=0;this.pt=Math.random()*Math.PI*2;
    const col=RCOL[this.risk];
    const br=risk==='HIGH'?.022:risk==='MEDIUM'?.017:.013;
    this.br=br;
    this.dot=new THREE.Mesh(new THREE.SphereGeometry(br,10,10),new THREE.MeshBasicMaterial({color:col,transparent:true}));
    const gs=br*(risk==='HIGH'?18:risk==='MEDIUM'?13:9);
    const spr=new THREE.Sprite(new THREE.SpriteMaterial({map:mkGlowTex(col),color:col,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false}));
    spr.scale.set(gs,gs,gs);this.spr=spr;
    this.ring=null;
    if(risk==='HIGH'){
      const rm=new THREE.MeshBasicMaterial({color:col,transparent:true,side:THREE.DoubleSide,blending:THREE.AdditiveBlending,depthWrite:false});
      this.ring=new THREE.Mesh(new THREE.RingGeometry(br*1.5,br*2.6,24),rm);
    }
    this.grp=new THREE.Group();this.grp.add(this.dot,this.spr);
    if(this.ring)this.grp.add(this.ring);
    const p=ll3d(lat,lng,RADIUS+br);
    this.grp.position.copy(p);this.grp.lookAt(new THREE.Vector3());this.grp.rotateX(Math.PI);
    earthMesh.add(this.grp);
  }
  update(now,dt){
    const age=now-this.born;if(age>this.ttl)return false;
    const fi=900,fo=1400;
    this.alpha=age<fi?age/fi:age>this.ttl-fo?(this.ttl-age)/fo:1;
    this.pt+=dt*.003;
    const pm=this.risk==='HIGH'?.35:this.risk==='MEDIUM'?.22:.12;
    const ps=1+Math.sin(this.pt)*pm;
    this.dot.scale.set(ps,ps,ps);this.dot.material.opacity=this.alpha*.9;
    this.spr.material.opacity=this.alpha*(.55+Math.sin(this.pt)*.14);
    if(this.ring){const rp=1+Math.sin(this.pt*.8)*.6;
      this.ring.scale.set(rp,rp,1);this.ring.material.opacity=this.alpha*.4*(1-Math.abs(Math.sin(this.pt*.8)));}
    return true;
  }
  dispose(){
    earthMesh.remove(this.grp);
    this.dot.geometry.dispose();this.dot.material.dispose();
    this.spr.material.map.dispose();this.spr.material.dispose();
    if(this.ring){this.ring.geometry.dispose();this.ring.material.dispose();}
  }
}

/* ── State ── */
let EVENTS=[];
let MODE='world';
let ACTIVE=null;
const DENSITY=Math.min(Math.max(CFG.eventDensity,20),200);

function riskFor(profile){
  const r=Math.random();
  if(profile==='HIGH')  return r<.44?'HIGH':r<.72?'MEDIUM':'LOW';
  if(profile==='MEDIUM')return r<.24?'HIGH':r<.58?'MEDIUM':'LOW';
  return r<.1?'HIGH':r<.38?'MEDIUM':'LOW';
}

/* World-mode seed points */
const WPTS=COUNTRIES.flatMap(c=>c.hotspots.slice(0,3));

function seedWorld(){
  EVENTS.forEach(e=>e.dispose());EVENTS=[];
  for(let i=0;i<DENSITY;i++){
    const p=WPTS[Math.floor(Math.random()*WPTS.length)];
    const la=p[0]+(Math.random()-.5)*6,ln=p[1]+(Math.random()-.5)*6;
    const r2=Math.random();
    EVENTS.push(new RiskEvent(la,ln,r2<.3?'HIGH':r2<.62?'MEDIUM':'LOW'));
  }
}

function seedCountry(c){
  EVENTS.forEach(e=>e.dispose());EVENTS=[];
  const cnt=Math.round(DENSITY*1.5);
  for(let i=0;i<cnt;i++){
    const hs=c.hotspots[Math.floor(Math.random()*c.hotspots.length)];
    EVENTS.push(new RiskEvent(hs[0]+(Math.random()-.5)*.38,hs[1]+(Math.random()-.5)*.38,riskFor(c.risk)));
  }
}

seedWorld();

/* ══ CAMERA ANIMATION ══════════════════════════════════════ */
const CAM={tZ:2.6,cZ:2.6,tRx:.25,tRy:0,ls:.07};
const eRot={x:.25,y:0};
const drag={on:false,lx:0,ly:0,vx:0,vy:0};

function flyTo(c){
  // Spin earth so country center faces camera
  const tY=-( (c.lng+180)*Math.PI/180-Math.PI );
  const tX=-( c.lat*Math.PI/180 );
  CAM.tRy=tY;CAM.tRx=Math.max(-Math.PI*.4,Math.min(Math.PI*.4,tX));
  const span=Math.max(c.latSpan||20,c.lngSpan||20);
  CAM.tZ=Math.max(1.25,Math.min(2.9,0.85+span*.022));
}
function flyWorld(){CAM.tZ=2.6;CAM.tRx=.25;CAM.tRy=eRot.y;}

canvas.addEventListener('mousedown',e=>{drag.on=true;drag.lx=e.clientX;drag.ly=e.clientY;drag.vx=drag.vy=0;dragged=false;});

/* ══ CLICK — detect which country on sphere ═══════════════ */
const raycaster=new THREE.Raycaster();
const mouse2=new THREE.Vector2();

/* Convert click → lat/lng on globe surface */
function clickToLatLng(ex,ey){
  mouse2.x=(ex/W())*2-1;
  mouse2.y=-(ey/H())*2+1;
  raycaster.setFromCamera(mouse2,camera);
  const hits=raycaster.intersectObject(earthMesh);
  if(!hits.length)return null;
  // hits[0].point is in WORLD space; un-rotate to local earth space
  const local=hits[0].point.clone().applyEuler(new THREE.Euler(-earthMesh.rotation.x,-earthMesh.rotation.y,-earthMesh.rotation.z,'ZYX'));
  const lat=90-Math.acos(local.y/RADIUS)*(180/Math.PI);
  let lng=Math.atan2(local.z,-local.x)*(180/Math.PI)-180;
  if(lng<-180)lng+=360;if(lng>180)lng-=360;
  return {lat,lng};
}

/* Find nearest country centre to a lat/lng */
function nearestCountry(lat,lng){
  let best=null,bestD=999;
  COUNTRIES.forEach(c=>{
    const dlat=c.lat-lat,dlng=c.lng-lng;
    const d=Math.sqrt(dlat*dlat+dlng*dlng);
    if(d<bestD){bestD=d;best=c;}
  });
  // also check hotspots for tight countries
  let bestH=null,bestHD=999;
  COUNTRIES.forEach(c=>{
    c.hotspots.forEach(([hlat,hlng])=>{
      const d=Math.sqrt((hlat-lat)**2+(hlng-lng)**2);
      if(d<bestHD){bestHD=d;bestH=c;}
    });
  });
  // prefer hotspot match if very close (within 8°)
  if(bestHD<8)return bestH;
  if(bestD<25)return best;
  return null;
}

const ripple=document.getElementById('click-ripple');

canvas.addEventListener('click',e=>{
  if(dragged)return; // was a drag, not a click
  const ll=clickToLatLng(e.clientX,e.clientY);
  if(!ll)return;

  // ripple animation at click point
  ripple.style.left=e.clientX+'px';
  ripple.style.top=e.clientY+'px';
  ripple.style.display='block';
  ripple.style.animation='none';
  void ripple.offsetWidth; // reflow
  ripple.style.animation='ripple-anim .55s ease-out forwards';
  setTimeout(()=>ripple.style.display='none',600);

  if(MODE==='country'){
    // click on globe while in country mode → check if same or different
    const c=nearestCountry(ll.lat,ll.lng);
    if(c&&c.name!==ACTIVE?.name){enterCountry(c);}
    else if(!c||c.name===ACTIVE?.name){exitToWorld();}
    return;
  }

  const c=nearestCountry(ll.lat,ll.lng);
  if(c){enterCountry(c);}
});

/* ══ ENTER / EXIT COUNTRY ════════════════════════════════ */
function enterCountry(c){
  ACTIVE=c;MODE='country';
  flyTo(c);
  seedCountry(c);
  // hide labels except active
  Object.entries(labelEls).forEach(([n,el])=>{
    el.style.display=n===c.name?'block':'none';
  });
  // UI
  document.getElementById('breadcrumb').style.display='flex';
  document.getElementById('bc-country').textContent=c.flag+' '+c.name;
  document.getElementById('main-title').textContent='Accident Risk · '+c.name;
  document.getElementById('hint').innerHTML='<strong>Click</strong> globe to return to World View &nbsp;·&nbsp; <strong>Scroll</strong> to zoom';
  document.getElementById('country-card').style.display='block';
  document.getElementById('cc-flag').textContent=c.flag;
  document.getElementById('cc-name').textContent=c.name;
  updateCountryCard();
}

function exitToWorld(){
  ACTIVE=null;MODE='world';
  flyWorld();
  seedWorld();
  // restore all labels
  Object.values(labelEls).forEach(el=>el.style.display='block');
  document.getElementById('breadcrumb').style.display='none';
  document.getElementById('main-title').textContent='Real-Time Accident Risk · Global View';
  document.getElementById('hint').innerHTML='<strong>Drag</strong> to rotate &nbsp;·&nbsp; <strong>Scroll</strong> to zoom &nbsp;·&nbsp; <strong>Click any country</strong> to drill in';
  document.getElementById('country-card').style.display='none';
}

document.getElementById('btn-back').addEventListener('click',exitToWorld);

function updateCountryCard(){
  const h=EVENTS.filter(e=>e.risk==='HIGH').length;
  const m=EVENTS.filter(e=>e.risk==='MEDIUM').length;
  const l=EVENTS.filter(e=>e.risk==='LOW').length;
  const tot=EVENTS.length||1;
  document.getElementById('cc-high').textContent=h;
  document.getElementById('cc-med').textContent=m;
  document.getElementById('cc-low').textContent=l;
  document.getElementById('cc-seg-h').style.width=(h/tot*100)+'%';
  document.getElementById('cc-seg-m').style.width=(m/tot*100)+'%';
  document.getElementById('cc-seg-l').style.width=(l/tot*100)+'%';
}

/* ══ DOT HOVER TOOLTIP ══════════════════════════════════ */
const ray2=new THREE.Raycaster();
const mPos=new THREE.Vector2(-9,-9);
const ttip=document.getElementById('tooltip');
let hovered=null;

window.addEventListener('mousemove',e=>{
  mPos.x=(e.clientX/W())*2-1;mPos.y=-(e.clientY/H())*2+1;
  ttip.style.left=(e.clientX+16)+'px';ttip.style.top=(e.clientY-6)+'px';
});
window.addEventListener('mouseleave',()=>{ttip.style.display='none';hovered=null;});

function checkHover(){
  ray2.setFromCamera(mPos,camera);
  let best=null,bd=Infinity;
  for(const ev of EVENTS){
    const hits=ray2.intersectObject(ev.dot);
    if(hits.length&&hits[0].distance<bd){bd=hits[0].distance;best=ev;}
  }
  if(best!==hovered){
    hovered=best;
    if(hovered){
      const col=RHEX[hovered.risk];
      document.getElementById('tt-risk').textContent=hovered.risk+' RISK';
      document.getElementById('tt-risk').style.color=col;
      document.getElementById('tt-coord').textContent=hovered.lat.toFixed(2)+'°, '+hovered.lng.toFixed(2)+'°';
      document.getElementById('tt-extra').innerHTML=`🌡 ${hovered.temp}°F &nbsp; 💨 ${hovered.wind} mph &nbsp; 👁 ${hovered.visib} mi`;
      ttip.style.display='block';
    }else{ttip.style.display='none';}
  }
}

/* ══ HUD UPDATES ════════════════════════════════════════ */
function updateHUD(){
  const h=EVENTS.filter(e=>e.risk==='HIGH').length;
  const m=EVENTS.filter(e=>e.risk==='MEDIUM').length;
  const l=EVENTS.filter(e=>e.risk==='LOW').length;
  document.getElementById('s-active').textContent=EVENTS.length;
  document.getElementById('s-high').textContent=h;
  document.getElementById('s-med').textContent=m;
  document.getElementById('s-low').textContent=l;
  document.getElementById('lc-low').textContent=l;
  document.getElementById('lc-med').textContent=m;
  document.getElementById('lc-high').textContent=h;
}

function refreshTicker(){
  const items=EVENTS.filter(e=>e.risk!=='LOW').slice(0,20).map(e=>{
    const col=RHEX[e.risk];
    return `<span class="ti"><span class="td" style="background:${col};box-shadow:0 0 4px ${col}"></span>
    ${e.risk} — ${e.lat.toFixed(2)}°, ${e.lng.toFixed(2)}° &nbsp;·&nbsp; 🌡${e.temp}°F 💨${e.wind}mph</span>`;}).join('');
  document.getElementById('ticker-inner').innerHTML=items||'🟢 All clear — monitoring…';
}
setInterval(refreshTicker,3500);refreshTicker();

/* ══ RENDER LOOP ════════════════════════════════════════ */
let lastT=performance.now();let ccT=0;

function animate(now){
  requestAnimationFrame(animate);
  const dt=Math.min(now-lastT,50);lastT=now;

  if(!drag.on){
    drag.vx*=.88;drag.vy*=.88;
    if(MODE==='world')CAM.tRy+=CFG.rotateSpeed+drag.vy;
    CAM.tRx+=drag.vx;
    CAM.tRx=Math.max(-Math.PI*.45,Math.min(Math.PI*.45,CAM.tRx));
  }

  // lerp rotation + zoom
  eRot.x+=(CAM.tRx-eRot.x)*CAM.ls;
  eRot.y+=(CAM.tRy-eRot.y)*CAM.ls;
  CAM.cZ+=(CAM.tZ-CAM.cZ)*CAM.ls;

  earthMesh.rotation.x=eRot.x;
  earthMesh.rotation.y=eRot.y;

  camera.position.z=CAM.cZ;
  camera.updateProjectionMatrix();

  // sync atm rotation
  scene.children.forEach(ch=>{
    if(ch!==earthMesh&&ch.type==='Mesh'&&ch.geometry?.type==='SphereGeometry'){
      ch.rotation.copy(earthMesh.rotation);
    }
  });

  // event lifecycle
  EVENTS=EVENTS.filter(ev=>{
    const alive=ev.update(now,dt);
    if(!alive){ev.dispose();return false;}
    ev.grp.visible=(ev.risk==='HIGH'&&CFG.showHigh)||(ev.risk==='MEDIUM'&&CFG.showMedium)||(ev.risk==='LOW'&&CFG.showLow);
    return true;
  });

  // spawn
  if(MODE==='world'&&EVENTS.length<Math.round(DENSITY*.85)&&Math.random()<.05){
    const p=WPTS[Math.floor(Math.random()*WPTS.length)];
    const r=Math.random();
    EVENTS.push(new RiskEvent(p[0]+(Math.random()-.5)*5,p[1]+(Math.random()-.5)*5,r<.3?'HIGH':r<.62?'MEDIUM':'LOW'));
  }
  if(MODE==='country'&&ACTIVE&&EVENTS.length<Math.round(DENSITY*1.2)&&Math.random()<.06){
    const hs=ACTIVE.hotspots[Math.floor(Math.random()*ACTIVE.hotspots.length)];
    EVENTS.push(new RiskEvent(hs[0]+(Math.random()-.5)*.4,hs[1]+(Math.random()-.5)*.4,riskFor(ACTIVE.risk)));
    ccT+=dt;if(ccT>1500){ccT=0;updateCountryCard();}
  }

  checkHover();
  updateHUD();
  updateLabelPositions(); // project labels every frame
  renderer.render(scene,camera);
}

window.addEventListener('load',()=>{
  setTimeout(()=>{const l=document.getElementById('loading');l.classList.add('out');setTimeout(()=>l.remove(),600);},700);
});

requestAnimationFrame(animate);
</script>
