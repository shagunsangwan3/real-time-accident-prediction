<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>🌍 Real-Time Accident Risk Globe</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000810;font-family:'Segoe UI',system-ui,sans-serif;color:#e0f0ff}
#c{position:fixed;inset:0;display:block;cursor:grab}
#c:active{cursor:grabbing}
#hud{position:fixed;inset:0;pointer-events:none;z-index:10}
/* topbar */
#top{position:absolute;top:0;left:0;right:0;padding:12px 20px;display:flex;align-items:center;gap:10px;
  background:linear-gradient(180deg,rgba(0,4,16,.95) 70%,transparent);pointer-events:auto}
#top h1{font-size:1rem;font-weight:700;letter-spacing:.06em;color:#7cc8f0;text-shadow:0 0 20px rgba(80,180,255,.5)}
.pdot{width:8px;height:8px;border-radius:50%;background:#22ff88;flex-shrink:0;
  box-shadow:0 0 8px #22ff88,0 0 18px #22ff88;animation:pu 1.6s ease-in-out infinite}
@keyframes pu{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.25;transform:scale(.55)}}
/* breadcrumb when country selected */
#bc{display:none;align-items:center;gap:8px;margin-left:auto;font-size:.75rem;color:#6ab0cc}
#bcname{color:#b8e0ff;font-weight:700;font-size:.85rem}
.btn{background:rgba(80,180,255,.12);border:1px solid rgba(80,180,255,.32);color:#7ab8d8;
  border-radius:7px;padding:4px 12px;font-size:.68rem;cursor:pointer;pointer-events:auto;transition:all .18s;letter-spacing:.04em}
.btn:hover{background:rgba(80,180,255,.24);color:#d0f0ff}
.btn.green{background:rgba(60,200,120,.13);border-color:rgba(60,200,120,.35);color:#50d898}
.btn.green:hover{background:rgba(60,200,120,.25)}
/* panels */
#lpanel{position:absolute;top:58px;left:20px;
  background:rgba(0,6,18,.88);border:1px solid rgba(80,180,255,.18);
  border-radius:12px;padding:11px 15px;backdrop-filter:blur(12px);min-width:175px;pointer-events:auto}
#lpanel h3{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:#4aa0cc;margin-bottom:8px}
.lrow{display:flex;align-items:center;gap:7px;margin-bottom:6px;font-size:.73rem;color:#90b8cc}
.lrow:last-child{margin-bottom:0}
.ldot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.lcount{margin-left:auto;font-weight:700;font-variant-numeric:tabular-nums}
/* stats */
#spanel{position:absolute;top:58px;right:20px;
  background:rgba(0,6,18,.88);border:1px solid rgba(80,180,255,.18);
  border-radius:12px;padding:11px 15px;backdrop-filter:blur(12px);min-width:180px;pointer-events:auto}
#spanel h3{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:#4aa0cc;margin-bottom:8px}
.srow{display:flex;justify-content:space-between;margin-bottom:5px;font-size:.72rem}
.srow:last-child{margin-bottom:0}
.sk{color:#5a8899}.sv{color:#b0d8e8;font-weight:600;font-variant-numeric:tabular-nums}
/* country tooltip on hover */
#ctip{position:fixed;pointer-events:none;z-index:20;
  background:rgba(0,6,20,.92);border:1px solid rgba(80,180,255,.28);
  border-radius:10px;padding:8px 14px;font-size:.74rem;display:none;
  backdrop-filter:blur(10px);min-width:170px}
#ctr{font-weight:700;font-size:.88rem;margin-bottom:3px}
#ctc{color:#6a9cb8;font-size:.68rem;margin-bottom:4px}
#ctx{color:#9ab8cc;font-size:.7rem;line-height:1.6}
/* hint */
#hint{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);
  font-size:.65rem;color:rgba(100,160,200,.45);white-space:nowrap;letter-spacing:.06em}
#hint b{color:rgba(130,190,230,.65)}
/* ticker */
#ticker{position:absolute;bottom:0;left:0;right:0;height:30px;
  background:rgba(0,4,12,.95);border-top:1px solid rgba(80,180,255,.1);
  display:flex;align-items:center;overflow:hidden}
.tlbl{flex-shrink:0;padding:0 11px;font-size:.62rem;letter-spacing:.12em;color:#4aa0cc;
  text-transform:uppercase;border-right:1px solid rgba(80,180,255,.14);height:100%;display:flex;align-items:center}
.ttrack{flex:1;overflow:hidden}
.tinner{display:flex;gap:48px;white-space:nowrap;font-size:.65rem;color:#7aA8c0;animation:sc 32s linear infinite}
@keyframes sc{0%{transform:translateX(100%)}100%{transform:translateX(-200%)}}
.ti{display:flex;align-items:center;gap:5px}
.tdo{width:5px;height:5px;border-radius:50%}
/* loading */
#ld{position:fixed;inset:0;background:#000810;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:100;transition:opacity .6s}
#ld.out{opacity:0;pointer-events:none}
.ring{width:48px;height:48px;border:2px solid rgba(80,180,255,.12);border-top-color:#4aa0cc;
  border-radius:50%;animation:sp .85s linear infinite;margin-bottom:14px}
@keyframes sp{to{transform:rotate(360deg)}}
#ld p{color:#4aa0cc;font-size:.78rem;letter-spacing:.1em}
/* click ripple */
#rip{position:fixed;pointer-events:none;z-index:25;width:44px;height:44px;
  margin:-22px 0 0 -22px;border-radius:50%;border:1.5px solid rgba(80,180,255,.8);display:none}
#rip.go{animation:ripgo .5s ease-out forwards}
@keyframes ripgo{0%{transform:scale(.3);opacity:1}100%{transform:scale(2.8);opacity:0}}
</style>
</head>

<div id="rip"></div>
<div id="ld"><div class="ring"></div><p>BUILDING GLOBE…</p></div>
<div id="hud">

    <div class="pdot"></div>
    <h1 id="htitle">Real-Time Accident Risk · Global View</h1>
    <div id="bc">

      <button class="btn green" id="btnmap">🗺 Open Street Map</button>
    </div>
  </div>
  <div id="lpanel">
    <h3>Risk Level</h3>
    <div class="lrow"><div class="ldot" style="background:#ff3366;box-shadow:0 0 6px #ff3366"></div>High<span class="lcount" style="color:#ff3366" id="lch">—</span></div>
    <div class="lrow"><div class="ldot" style="background:#ffaa00;box-shadow:0 0 6px #ffaa00"></div>Medium<span class="lcount" style="color:#ffaa00" id="lcm">—</span></div>
    <div class="lrow"><div class="ldot" style="background:#22ff88;box-shadow:0 0 6px #22ff88"></div>Low<span class="lcount" style="color:#22ff88" id="lcl">—</span></div>
  </div>
  <div id="spanel">
    <h3>Live Stats</h3>
    <div class="srow"><span class="sk">Active Events</span><span class="sv" style="color:#22ff88" id="sa">—</span></div>
    <div class="srow"><span class="sk">High Risk</span><span class="sv" style="color:#ff3366" id="sh">—</span></div>
    <div class="srow"><span class="sk">Medium Risk</span><span class="sv" style="color:#ffaa00" id="sm">—</span></div>
    <div class="srow"><span class="sk">Low Risk</span><span class="sv" style="color:#22ff88" id="sl">—</span></div>
  </div>
  <div id="ctip"><div id="ctr"></div><div id="ctc"></div><div id="ctx"></div></div>
  <div id="hint"><b>Drag</b> to rotate &nbsp;·&nbsp; <b>Scroll</b> to zoom &nbsp;·&nbsp; <b>Click a country</b> to drill in</div>
  <div id="ticker">
    <div class="tlbl">Live Feed</div>
    <div class="ttrack"><div class="tinner" id="tinner">Loading…</div></div>
  </div>
</div>

/* ── Earth texture: ocean + land + country borders + city dots ── */
function buildEarthTex(){
  const S=4096,H2=S/2;  // 4K texture for crisp borders
  const tc=document.createElement('canvas');tc.width=S;tc.height=H2;
  const tx=tc.getContext('2d');

  // Deep ocean gradient
  const og=tx.createLinearGradient(0,0,0,H2);
  og.addColorStop(0,'#061420');og.addColorStop(.4,'#09203a');og.addColorStop(1,'#050e18');
  tx.fillStyle=og;tx.fillRect(0,0,S,H2);

  // Helpers: lon/lat → pixel
  const px=(lng,lat)=>[(lng+180)/360*S,(90-lat)/180*H2];

  // Draw a land polygon
  function drawPoly(pts,fill,stroke,sw){
    if(pts.length<3)return;
    tx.beginPath();
    const[x0,y0]=px(pts[0][1],pts[0][0]);tx.moveTo(x0,y0);
    for(let i=1;i<pts.length;i++){const[x,y]=px(pts[i][1],pts[i][0]);tx.lineTo(x,y);}
    tx.closePath();
    if(fill){tx.fillStyle=fill;tx.fill();}
    if(stroke){tx.strokeStyle=stroke;tx.lineWidth=sw||1;tx.stroke();}
  }

  // Simplified world land masses (background green so oceans pop)
  const LAND=[
    // North America
    [[49,-125],[49,-95],[49,-67],[47,-53],[44,-65],[25,-80],[15,-90],[8,-77],[8,-82],[9,-84],[26,-97],[32,-117],[49,-125]],
    // South America
    [[12,-73],[12,-60],[0,-50],[-10,-37],[-23,-43],[-35,-57],[-55,-68],[-55,-72],[-40,-73],[-18,-70],[0,-78],[12,-73]],
    // Europe
    [[71,26],[70,32],[60,28],[55,22],[50,24],[45,18],[42,28],[38,26],[36,14],[36,6],[44,8],[48,2],[51,2],[54,8],[58,8],[58,16],[60,26],[65,16],[70,26]],
    // Africa
    [[37,10],[37,36],[22,38],[10,44],[0,42],[-10,40],[-35,26],[-34,19],[-22,14],[0,8],[10,-18],[20,-17],[37,10]],
    // Asia (simplified)
    [[72,32],[72,80],[68,60],[65,58],[56,60],[48,58],[40,50],[38,44],[35,36],[28,34],[22,40],[14,44],[10,42],[8,44],[6,44],[2,28],[8,77],[12,42],[18,52],[22,60],[25,57],[30,49],[30,57],[22,68],[8,78],[1,104],[4,100],[8,100],[12,103],[22,100],[28,97],[35,78],[38,75],[42,52],[38,44],[42,44],[42,32],[72,32]],
    // Australia
    [[-13,132],[-13,137],[-12,136],[-22,114],[-30,115],[-38,140],[-39,146],[-32,153],[-22,150],[-14,144],[-13,132]],
    // Greenland
    [[84,-52],[84,-10],[72,-22],[60,-44],[64,-52],[84,-52]],
    // Japan (simplified)
    [[33,131],[34,131],[36,137],[38,141],[42,141],[44,145],[44,142],[42,141],[39,141],[36,136],[34,130],[33,131]],
    // UK
    [[51,0],[52,2],[56,2],[58,0],[60,-2],[58,-4],[56,-6],[54,-4],[51,0]],
    // New Zealand
    [[-34,172],[-34,174],[-38,178],[-44,171],[-46,169],[-46,170],[-41,175],[-36,175],[-34,172]],
    // Sri Lanka
    [[10,80],[8,82],[7,82],[7,80],[9,79],[10,80]],
    // Philippines (Luzon)
    [[18,121],[18,122],[16,122],[14,121],[13,121],[15,120],[18,121]],
    // Indonesia Sumatra
    [[5,95],[5,105],[0,104],[0,102],[-5,104],[-5,107],[0,108],[5,108],[6,100],[5,95]],
    // Indonesia Java
    [[-6,106],[-6,111],[-7,112],[-8,115],[-8,107],[-6,106]],
    // Iceland
    [[64,-14],[64,-22],[66,-24],[66,-20],[63,-14],[64,-14]],
  ];
  // Base land — dark forest green
  LAND.forEach(pts=>drawPoly(pts,'#16382a',null));
  // Subtle texture: lighter inner for visual depth
  LAND.forEach(pts=>drawPoly(pts,'rgba(30,80,50,.28)',null));

  // Country fills — strong enough to see on globe
  CDB.forEach(c=>{
    if(!c.bounds||c.bounds.length<3)return;
    const colBase=c.risk==='HIGH'?'rgba(140,20,40,.72)':c.risk==='MEDIUM'?'rgba(120,80,0,.62)':'rgba(10,90,40,.55)';
    drawPoly(c.bounds,colBase,null);
    // Second pass: lighter inner glow
    const colGlow=c.risk==='HIGH'?'rgba(255,60,90,.18)':c.risk==='MEDIUM'?'rgba(255,180,0,.15)':'rgba(40,220,100,.14)';
    drawPoly(c.bounds,colGlow,null);
  });

  // Country borders — thick bright lines clearly visible on globe
  CDB.forEach(c=>{
    if(!c.bounds||c.bounds.length<3)return;
    const bc=c.risk==='HIGH'?'rgba(255,90,120,.95)':c.risk==='MEDIUM'?'rgba(255,190,50,.9)':'rgba(60,240,140,.88)';
    // Thick glow line first
    drawPoly(c.bounds,null,'rgba(255,255,255,.12)',5);
    // Sharp color line on top
    drawPoly(c.bounds,null,bc,2.2);
  });

  // Lat/lng grid
  tx.globalAlpha=.22;
  for(let la=-75;la<=75;la+=15){
    tx.beginPath();const[,y0]=px(0,la);tx.moveTo(0,y0);tx.lineTo(S,y0);
    tx.strokeStyle=la===0?'rgba(100,200,255,.85)':'rgba(60,140,200,.5)';
    tx.lineWidth=la===0?2:.8;tx.stroke();}
  for(let lo=-165;lo<=180;lo+=15){
    tx.beginPath();tx.moveTo(...px(lo,-90));tx.lineTo(...px(lo,90));
    tx.strokeStyle='rgba(60,140,200,.4)';tx.lineWidth=.8;tx.stroke();}
  tx.globalAlpha=1;

  // Polar ice
  [[90,S*.12],[H2,S*.09]].forEach(([cy,r])=>{
    const g=tx.createRadialGradient(S/2,cy,0,S/2,cy,r*S);
    g.addColorStop(0,'rgba(210,235,255,.9)');g.addColorStop(1,'rgba(180,220,255,0)');
    tx.fillStyle=g;tx.fillRect(0,0,S,H2);});

  // City dots — bright warm dots on texture
  CDB.forEach(c=>{
    c.cities.slice(0,8).forEach(city=>{
      const[cx,cy]=px(city.lng,city.lat);
      // Outer glow
      tx.beginPath();tx.arc(cx,cy,7,0,6.28);
      tx.fillStyle='rgba(255,230,120,.2)';tx.fill();
      // Main dot
      tx.beginPath();tx.arc(cx,cy,3.5,0,6.28);
      tx.fillStyle='rgba(255,240,160,.92)';tx.fill();
      // Bright center
      tx.beginPath();tx.arc(cx,cy,1.5,0,6.28);
      tx.fillStyle='rgba(255,255,220,1)';tx.fill();})});

  return new THREE.CanvasTexture(tc);
}

// Specular map: oceans shiny, land matte
function buildSpecTex(){
  const S=512,H2=S/2;const tc=document.createElement('canvas');tc.width=S;tc.height=H2;
  const tx=tc.getContext('2d');tx.fillStyle='#888';tx.fillRect(0,0,S,H2);
  // ocean specular (brighter = shinier)
  tx.fillStyle='#ccc';tx.fillRect(0,0,S/5,H2);tx.fillRect(S*.65,0,S,H2);
  tx.fillStyle='#bbb';tx.fillRect(0,0,S*.15,H2);tx.fillRect(S*.62,0,S,H2);
  return new THREE.CanvasTexture(tc);}

const earthMat=new THREE.MeshPhongMaterial({
  map:buildEarthTex(),specularMap:buildSpecTex(),
  specular:new THREE.Color(0x112233),shininess:28,
  emissive:new THREE.Color(0x020810),emissiveIntensity:.2});
const earthMesh=new THREE.Mesh(new THREE.SphereGeometry(RL,72,72),earthMat);

  new THREE.ShaderMaterial({transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,side,
    vertexShader:`varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
    fragmentShader:`varying vec3 vN;void main(){float r=pow(1.-abs(dot(vN,vec3(0,0,1.))),${pow});gl_FragColor=vec4(.1,.4,.85,r*${op});}`}));}
const atm1=mkAtm(RL*1.04,THREE.FrontSide,'2.4','.55');scene.add(atm1);
const atm2=mkAtm(RL*1.12,THREE.BackSide,'4.0','.15');scene.add(atm2);

// Stars
(()=>{const n=2500,g=new THREE.BufferGeometry(),p=new Float32Array(n*3),co=new Float32Array(n*3);
  for(let i=0;i<n;i++){const t=Math.random()*6.28,a=Math.acos(2*Math.random()-1),r=150+Math.random()*100;
    p[i*3]=r*Math.sin(a)*Math.cos(t);p[i*3+1]=r*Math.cos(a);p[i*3+2]=r*Math.sin(a)*Math.sin(t);
    const b=.35+Math.random()*.65;co[i*3]=b;co[i*3+1]=b;co[i*3+2]=b;}
  g.setAttribute('position',new THREE.BufferAttribute(p,3));g.setAttribute('color',new THREE.BufferAttribute(co,3));
  scene.add(new THREE.Points(g,new THREE.PointsMaterial({size:.28,vertexColors:true,sizeAttenuation:true})));})();

/* ── lat/lng to 3D ── */
function ll3(lat,lng,r){const ph=(90-lat)*Math.PI/180,th=(lng+180)*Math.PI/180;
  return new THREE.Vector3(-r*Math.sin(ph)*Math.cos(th),r*Math.cos(ph),r*Math.sin(ph)*Math.sin(th));}

/* ── Glow texture for risk dots ── */
function mkGlowTex(col){const s=64,tc=document.createElement('canvas');tc.width=s;tc.height=s;
  const tx=tc.getContext('2d'),g=tx.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
  const h='#'+col.toString(16).padStart(6,'0');
  g.addColorStop(0,h+'ff');g.addColorStop(.28,h+'cc');g.addColorStop(.6,h+'33');g.addColorStop(1,h+'00');
  tx.fillStyle=g;tx.fillRect(0,0,s,s);return new THREE.CanvasTexture(tc);}

const RC={HIGH:0xff3366,MEDIUM:0xffaa00,LOW:0x22ff88};

/* Risk dot */
class Dot{
  constructor(lat,lng,risk,city=''){
    this.lat=lat;this.lng=lng;this.risk=risk;this.city=city;
    this.temp=(Math.random()*55+32).toFixed(1);this.wind=(Math.random()*40).toFixed(1);this.vis=(Math.random()*9+1).toFixed(1);
    this.ttl=10000+Math.random()*14000;this.born=Date.now()-Math.random()*6000;
    this.alpha=0;this.pt=Math.random()*6.28;
    const col=RC[risk];const br=risk==='HIGH'?.021:risk==='MEDIUM'?.016:.012;this.br=br;
    this.sphere=new THREE.Mesh(new THREE.SphereGeometry(br,8,8),new THREE.MeshBasicMaterial({color:col,transparent:true}));
    const gs=br*(risk==='HIGH'?17:risk==='MEDIUM'?12:8);
    this.glow=new THREE.Sprite(new THREE.SpriteMaterial({map:mkGlowTex(col),color:col,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false}));
    this.glow.scale.set(gs,gs,gs);
    this.ring=null;
    if(risk==='HIGH'){this.ring=new THREE.Mesh(new THREE.RingGeometry(br*1.4,br*2.4,20),
      new THREE.MeshBasicMaterial({color:col,transparent:true,side:THREE.DoubleSide,blending:THREE.AdditiveBlending,depthWrite:false}));}
    this.grp=new THREE.Group();this.grp.add(this.sphere,this.glow);if(this.ring)this.grp.add(this.ring);
    const pos=ll3(lat,lng,RL+br);this.grp.position.copy(pos);this.grp.lookAt(new THREE.Vector3());this.grp.rotateX(Math.PI);
    earthMesh.add(this.grp);}
  update(now,dt){const age=now-this.born;if(age>this.ttl)return false;
    this.alpha=age<800?age/800:age>this.ttl-1200?(this.ttl-age)/1200:1;
    this.pt+=dt*.0028;const pm=this.risk==='HIGH'?.32:this.risk==='MEDIUM'?.2:.1;
    const ps=1+Math.sin(this.pt)*pm;
    this.sphere.scale.set(ps,ps,ps);this.sphere.material.opacity=this.alpha*.92;
    this.glow.material.opacity=this.alpha*(.52+Math.sin(this.pt)*.13);
    if(this.ring){const rp=1+Math.sin(this.pt*.75)*.55;this.ring.scale.set(rp,rp,1);
      this.ring.material.opacity=this.alpha*.38*(1-Math.abs(Math.sin(this.pt*.75)));}
    return true;}
  dispose(){earthMesh.remove(this.grp);this.sphere.geometry.dispose();this.sphere.material.dispose();
    this.glow.material.map.dispose();this.glow.material.dispose();
    if(this.ring){this.ring.geometry.dispose();this.ring.material.dispose();}}}

let DOTS=[],MODE='world',ACTIVE=null;
const WPTS=CDB.flatMap(c=>c.cities.slice(0,3));

function seedWorld(){DOTS.forEach(d=>d.dispose());DOTS=[];
  for(let i=0;i<80;i++){const p=WPTS[Math.floor(Math.random()*WPTS.length)];
    const r=Math.random();DOTS.push(new Dot(p.lat+(Math.random()-.5)*4,p.lng+(Math.random()-.5)*4,r<.3?'HIGH':r<.62?'MEDIUM':'LOW',p.n));}}

function seedCountry(c){DOTS.forEach(d=>d.dispose());DOTS=[];
  for(let i=0;i<120;i++){const hs=c.cities[Math.floor(Math.random()*c.cities.length)];
    DOTS.push(new Dot(hs.lat+(Math.random()-.5)*.45,hs.lng+(Math.random()-.5)*.45,riskFor(c.risk),hs.n));}}
seedWorld();

/* ── Country name labels (HTML projected onto globe) ── */
const labelEls={};
CDB.forEach(c=>{
  const d=document.createElement('div');
  d.style.cssText='position:fixed;pointer-events:none;transform:translate(-50%,-50%);z-index:12;user-select:none;white-space:nowrap;display:flex;align-items:center;gap:3px;font-size:.54rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase;';
  const col=c.risk==='HIGH'?'rgba(255,120,150,.95)':c.risk==='MEDIUM'?'rgba(255,210,80,.95)':'rgba(90,255,170,.95)';
  const sh=c.risk==='HIGH'?'0 0 10px rgba(255,40,80,.9)':c.risk==='MEDIUM'?'0 0 10px rgba(255,150,0,.9)':'0 0 10px rgba(0,210,100,.9)';
  d.style.color=col;d.style.textShadow=sh;
  d.innerHTML=`<span style="font-size:.72rem">${c.flag}</span><span>${c.name}</span>`;
  document.body.appendChild(d);labelEls[c.name]=d;
  c._lp=ll3(c.lat,c.lng,RL+.015);});

function projectLabels(){
  CDB.forEach(c=>{
    const wp=c._lp.clone().applyEuler(earthMesh.rotation);
    const v=wp.clone().project(cam);
    const cd=new THREE.Vector3().subVectors(cam.position,wp).normalize();
    const dot=wp.clone().normalize().dot(cd);
    const el=labelEls[c.name];
    const inCountryMode=MODE==='country';
    if(dot>0.12&&(!inCountryMode||c.name===ACTIVE?.name)){
      el.style.display='flex';
      el.style.left=(v.x*.5+.5)*W()+'px';
      el.style.top=(-.5*v.y+.5)*H()+'px';
      el.style.opacity=String(Math.max(0,Math.min(1,(dot-.1)/.28)));
      const z=Math.max(.7,Math.min(1.5,2.7/cam.position.z));
      el.style.fontSize=(.52*z)+'rem';}
    else el.style.display='none';});}

/* ── Camera control ── */
const CAM={tZ:2.7,cZ:2.7,tRx:.22,tRy:0,ls:.06};
const eR={x:.22,y:0};
const drag={on:false,lx:0,ly:0,vx:0,vy:0};let dragged=false;

function flyTo(c){
  CAM.tRy=-((c.lng+180)*Math.PI/180-Math.PI);
  CAM.tRx=Math.max(-Math.PI*.42,Math.min(Math.PI*.42,-(c.lat*Math.PI/180)));
  CAM.tZ=1.55;}
function flyWorld(){CAM.tZ=2.7;CAM.tRx=.22;CAM.tRy=eR.y;}

cv.addEventListener('mousedown',e=>{drag.on=true;drag.lx=e.clientX;drag.ly=e.clientY;drag.vx=drag.vy=0;dragged=false;});
window.addEventListener('mouseup',()=>{drag.on=false;});
window.addEventListener('mousemove',e=>{
  if(!drag.on)return;if(Math.abs(e.clientX-drag.lx)>2||Math.abs(e.clientY-drag.ly)>2)dragged=true;
  drag.vy=(e.clientX-drag.lx)*.008;drag.vx=(e.clientY-drag.ly)*.008;
  CAM.tRy+=drag.vy;CAM.tRx+=drag.vx;CAM.tRx=Math.max(-Math.PI*.44,Math.min(Math.PI*.44,CAM.tRx));
  drag.lx=e.clientX;drag.ly=e.clientY;});
cv.addEventListener('wheel',e=>{e.preventDefault();CAM.tZ*=e.deltaY<0?.89:1.12;CAM.tZ=Math.max(1.1,Math.min(5,CAM.tZ));},{passive:false});
cv.addEventListener('touchstart',e=>{drag.on=true;drag.lx=e.touches[0].clientX;drag.ly=e.touches[0].clientY;drag.vx=drag.vy=0;dragged=false;},{passive:true});
window.addEventListener('touchend',()=>{drag.on=false;},{passive:true});
window.addEventListener('touchmove',e=>{if(!drag.on)return;dragged=true;
  drag.vy=(e.touches[0].clientX-drag.lx)*.008;drag.vx=(e.touches[0].clientY-drag.ly)*.008;
  CAM.tRy+=drag.vy;CAM.tRx+=drag.vx;CAM.tRx=Math.max(-Math.PI*.44,Math.min(Math.PI*.44,CAM.tRx));
  drag.lx=e.touches[0].clientX;drag.ly=e.touches[0].clientY;},{passive:true});

/* ── Click → detect country ── */
const ray=new THREE.Raycaster(),mv=new THREE.Vector2();
function clickLL(ex,ey){
  mv.x=(ex/W())*2-1;mv.y=-(ey/H())*2+1;ray.setFromCamera(mv,cam);
  const hits=ray.intersectObject(earthMesh);if(!hits.length)return null;
  const loc=hits[0].point.clone().applyEuler(new THREE.Euler(-earthMesh.rotation.x,-earthMesh.rotation.y,-earthMesh.rotation.z,'ZYX'));
  const lat=90-Math.acos(Math.max(-1,Math.min(1,loc.y/RL)))*(180/Math.PI);
  let lng=Math.atan2(loc.z,-loc.x)*(180/Math.PI)-180;
  if(lng<-180)lng+=360;if(lng>180)lng-=360;return{lat,lng};}

function nearestC(lat,lng){
  let b=null,bd=9999;
  CDB.forEach(c=>{
    c.cities.forEach(hs=>{const d=Math.sqrt((hs.lat-lat)**2+(hs.lng-lng)**2);if(d<bd){bd=d;b=c;}});});
  if(bd<18)return b;
  let b2=null,b2d=9999;
  CDB.forEach(c=>{const d=Math.sqrt((c.lat-lat)**2+(c.lng-lng)**2);if(d<b2d){b2d=d;b2=c;}});
  return b2d<40?b2:null;}

const ripEl=document.getElementById('rip');
function doRipple(x,y){ripEl.style.left=x+'px';ripEl.style.top=y+'px';ripEl.style.display='block';
  ripEl.classList.remove('go');void ripEl.offsetWidth;ripEl.classList.add('go');
  setTimeout(()=>{ripEl.style.display='none';ripEl.classList.remove('go');},550);}

cv.addEventListener('click',e=>{if(dragged)return;
  const ll=clickLL(e.clientX,e.clientY);if(!ll)return;
  doRipple(e.clientX,e.clientY);
  if(MODE==='country'){exitToWorld();return;}
  const c=nearestC(ll.lat,ll.lng);if(c)enterCountry(c);});

function enterCountry(c){
  ACTIVE=c;MODE='country';flyTo(c);seedCountry(c);
  document.getElementById('bc').style.display='flex';
  document.getElementById('bcname').textContent=c.flag+' '+c.name;
  document.getElementById('htitle').textContent='Risk Map · '+c.name;
  document.getElementById('hint').innerHTML='<b>Click globe</b> to go back &nbsp;·&nbsp; <b>Open Street Map</b> for real city view';
  document.getElementById('btnmap').style.display='inline-block';}

function exitToWorld(){
  ACTIVE=null;MODE='world';flyWorld();seedWorld();
  document.getElementById('bc').style.display='none';
  document.getElementById('btnmap').style.display='none';
  document.getElementById('htitle').textContent='Real-Time Accident Risk · Global View';
  document.getElementById('hint').innerHTML='<b>Drag</b> to rotate &nbsp;·&nbsp; <b>Scroll</b> to zoom &nbsp;·&nbsp; <b>Click a country</b> to drill in';}

document.getElementById('btnback').addEventListener('click',exitToWorld);
document.getElementById('btnmap').style.display='none';
document.getElementById('btnmap').addEventListener('click',()=>{
  if(!ACTIVE)return;
  // Open map_view.html in new tab, passing country data via sessionStorage
  const data={name:ACTIVE.name,flag:ACTIVE.flag,lat:ACTIVE.lat,lng:ACTIVE.lng,
    mapZ:ACTIVE.mapZ||5,risk:ACTIVE.risk,cities:ACTIVE.cities};
  try{sessionStorage.setItem('mapCountry',JSON.stringify(data));}catch(e){}
  window.open('map_view.html','_blank');});

/* ── Hover on dots ── */
const ray2=new THREE.Raycaster(),mv2=new THREE.Vector2(-9,-9);
const ctip=document.getElementById('ctip');let hovDot=null;
window.addEventListener('mousemove',e=>{mv2.x=(e.clientX/W())*2-1;mv2.y=-(e.clientY/H())*2+1;
  ctip.style.left=(e.clientX+14)+'px';ctip.style.top=(e.clientY-4)+'px';});
window.addEventListener('mouseleave',()=>{ctip.style.display='none';hovDot=null;});
function checkHover(){
  ray2.setFromCamera(mv2,cam);let best=null,bd=Infinity;
  DOTS.forEach(d=>{const h=ray2.intersectObject(d.sphere);if(h.length&&h[0].distance<bd){bd=h[0].distance;best=d;}});
  if(best!==hovDot){hovDot=best;
    if(hovDot){const col=RCOL[hovDot.risk];
      document.getElementById('ctr').textContent=RNAME[hovDot.risk];document.getElementById('ctr').style.color=col;
      document.getElementById('ctc').textContent=(hovDot.city?hovDot.city+' · ':'')+hovDot.lat.toFixed(2)+'°, '+hovDot.lng.toFixed(2)+'°';
      document.getElementById('ctx').innerHTML=`🌡 ${hovDot.temp}°F &nbsp; 💨 ${hovDot.wind} mph &nbsp; 👁 ${hovDot.vis} mi`;
      ctip.style.display='block';}else ctip.style.display='none';}}

/* ── HUD updates ── */
function updateHUD(){
  const h=DOTS.filter(d=>d.risk==='HIGH').length,m=DOTS.filter(d=>d.risk==='MEDIUM').length,l=DOTS.filter(d=>d.risk==='LOW').length;
  document.getElementById('sa').textContent=DOTS.length;document.getElementById('sh').textContent=h;
  document.getElementById('sm').textContent=m;document.getElementById('sl').textContent=l;
  document.getElementById('lch').textContent=h;document.getElementById('lcm').textContent=m;document.getElementById('lcl').textContent=l;}

function refreshTicker(){
  const items=DOTS.filter(d=>d.risk!=='LOW').slice(0,22).map(d=>{const col=RCOL[d.risk];
    return `<span class="ti"><span class="tdo" style="background:${col};box-shadow:0 0 4px ${col}"></span>${d.risk} — ${d.city||'Zone'} ${d.lat.toFixed(1)}°, ${d.lng.toFixed(1)}° 🌡${d.temp}°F 💨${d.wind}mph</span>`;}).join('');
  document.getElementById('tinner').innerHTML=items||'🟢 All clear';}
setInterval(refreshTicker,3500);refreshTicker();

/* ── Render loop ── */
let lastT=performance.now();
function animate(now){
  requestAnimationFrame(animate);const dt=Math.min(now-lastT,50);lastT=now;
  if(!drag.on){drag.vx*=.87;drag.vy*=.87;
    if(MODE==='world')CAM.tRy+=.0014+drag.vy;CAM.tRx+=drag.vx;
    CAM.tRx=Math.max(-Math.PI*.44,Math.min(Math.PI*.44,CAM.tRx));}
  eR.x+=(CAM.tRx-eR.x)*CAM.ls;eR.y+=(CAM.tRy-eR.y)*CAM.ls;CAM.cZ+=(CAM.tZ-CAM.cZ)*CAM.ls;
  earthMesh.rotation.x=eR.x;earthMesh.rotation.y=eR.y;
  atm1.rotation.copy(earthMesh.rotation);atm2.rotation.copy(earthMesh.rotation);
  cam.position.z=CAM.cZ;cam.updateProjectionMatrix();
  DOTS=DOTS.filter(d=>{const a=d.update(now,dt);if(!a){d.dispose();return false;}return true;});
  if(MODE==='world'&&DOTS.length<68&&Math.random()<.04){
    const p=WPTS[Math.floor(Math.random()*WPTS.length)];const r=Math.random();
    DOTS.push(new Dot(p.lat+(Math.random()-.5)*4,p.lng+(Math.random()-.5)*4,r<.3?'HIGH':r<.62?'MEDIUM':'LOW',p.n));}
  if(MODE==='country'&&ACTIVE&&DOTS.length<115&&Math.random()<.05){
    const hs=ACTIVE.cities[Math.floor(Math.random()*ACTIVE.cities.length)];
    DOTS.push(new Dot(hs.lat+(Math.random()-.5)*.42,hs.lng+(Math.random()-.5)*.42,riskFor(ACTIVE.risk),hs.n));}
  checkHover();updateHUD();projectLabels();renderer.render(scene,cam);}

window.addEventListener('load',()=>{setTimeout(()=>{const l=document.getElementById('ld');l.classList.add('out');setTimeout(()=>l.remove(),700);},800);});
requestAnimationFrame(animate);
</script>
