<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>🗺 Risk Map</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#060d1a;
  font-family:'Segoe UI',system-ui,sans-serif;color:#c8e8ff}

/* ── TOP BAR ── */
#bar{position:fixed;top:0;left:0;right:0;height:50px;z-index:40;
  background:rgba(0,4,14,.97);border-bottom:1px solid rgba(80,180,255,.18);
  display:flex;align-items:center;padding:0 14px;gap:8px}
#bartitle{font-size:.88rem;font-weight:700;color:#7cc8f0;letter-spacing:.05em;white-space:nowrap;flex-shrink:0}
#styletabs{display:flex;gap:4px;flex-shrink:0}
.stab{background:rgba(80,180,255,.1);border:1px solid rgba(80,180,255,.22);
  color:#6ab0cc;border-radius:6px;padding:4px 10px;font-size:.67rem;cursor:pointer;
  transition:all .15s;letter-spacing:.03em;white-space:nowrap}
.stab:hover{background:rgba(80,180,255,.2);color:#c0e8ff}
.stab.on{background:rgba(80,180,255,.28);border-color:rgba(80,180,255,.6);color:#e0f4ff}
#searchbar{display:flex;gap:5px;align-items:center;flex:1;max-width:360px;margin-left:auto}
#sinput{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(80,180,255,.26);
  border-radius:7px;padding:5px 11px;color:#c0e0f4;font-size:.73rem;outline:none;min-width:0}
#sinput:focus{border-color:rgba(80,180,255,.55);background:rgba(255,255,255,.09)}
#sinput::placeholder{color:rgba(100,165,210,.4)}
.btn{background:rgba(80,180,255,.14);border:1px solid rgba(80,180,255,.32);
  color:#7ab8d8;border-radius:6px;padding:5px 10px;font-size:.67rem;cursor:pointer;
  white-space:nowrap;transition:all .15s;flex-shrink:0}
.btn:hover{background:rgba(80,180,255,.26);color:#d0f0ff}
.btn.g{background:rgba(60,200,120,.13);border-color:rgba(60,200,120,.34);color:#48cc88}
.btn.g:hover{background:rgba(60,200,120,.24)}
.btn.r{background:rgba(255,60,80,.1);border-color:rgba(255,60,80,.28);color:#ff7090}
.btn.r:hover{background:rgba(255,60,80,.2)}

/* ── MAP CANVAS ── */
#mapwrap{position:fixed;top:50px;left:0;right:0;bottom:30px;overflow:hidden;cursor:grab}
#mapwrap:active{cursor:grabbing}
#mc{display:block;width:100%;height:100%}

/* ── ZOOM BUTTONS ── */
#zbtns{position:absolute;bottom:50px;left:12px;display:flex;flex-direction:column;gap:4px;z-index:20}
.zbtn{width:32px;height:32px;background:rgba(0,6,20,.88);border:1px solid rgba(80,180,255,.28);
  border-radius:7px;color:#7ab8d8;font-size:1.1rem;cursor:pointer;display:flex;
  align-items:center;justify-content:center;transition:all .15s;line-height:1}
.zbtn:hover{background:rgba(80,180,255,.2);color:#d0f0ff}

/* ── ATTRIBUTION ── */
#attr{position:absolute;bottom:33px;right:6px;font-size:.55rem;color:rgba(100,160,200,.45);z-index:15}
#attr a{color:rgba(100,160,200,.55);text-decoration:none}

/* ── RISK DOTS ── */
.rdot{position:absolute;border-radius:50%;cursor:pointer;transform:translate(-50%,-50%);
  transition:transform .1s;z-index:10;pointer-events:auto}
.rdot:hover{transform:translate(-50%,-50%) scale(1.6)!important;z-index:20}

/* ── POPUP ── */
#popup{position:absolute;z-index:30;display:none;pointer-events:auto;
  background:rgba(0,6,22,.96);border:1px solid rgba(80,180,255,.32);
  border-radius:12px;padding:12px 15px;min-width:210px;max-width:260px;
  box-shadow:0 8px 28px rgba(0,0,0,.7);backdrop-filter:blur(12px)}
#pop-close{position:absolute;top:6px;right:9px;cursor:pointer;color:#4aa0cc;font-size:.9rem;line-height:1}
#pop-close:hover{color:#c0e8ff}
#pop-risk{font-weight:700;font-size:.86rem;margin-bottom:3px}
#pop-loc{font-size:.68rem;color:#4a8090;margin-bottom:7px}
#pop-stats{font-size:.7rem;color:#90b8cc;line-height:1.85}
#pop-btns{display:flex;gap:6px;margin-top:9px}
.pbtn{flex:1;padding:5px 0;border-radius:7px;font-size:.67rem;font-weight:600;
  cursor:pointer;text-align:center;border:1px solid;transition:all .15s}
.pbtn:hover{opacity:.8}

/* ── SIDE PANEL ── */
#panel{position:absolute;top:8px;right:8px;z-index:25;width:252px;display:none;
  background:rgba(0,6,22,.94);border:1px solid rgba(80,180,255,.22);
  border-radius:12px;overflow:hidden;box-shadow:0 8px 28px rgba(0,0,0,.6)}
#ph{padding:12px 14px 9px;border-bottom:1px solid rgba(80,180,255,.12)}
#pbadge{display:inline-block;font-size:.59rem;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;padding:2px 8px;border-radius:7px;margin-bottom:4px}
#pname{font-size:.92rem;font-weight:700;color:#c8e8ff;margin-bottom:1px}
#pcoord{font-size:.64rem;color:#4a8090}
#pbody{padding:9px 14px}
.pr{display:flex;justify-content:space-between;margin-bottom:5px;font-size:.71rem}
.pr:last-child{margin-bottom:0}.pk{color:#4a8090}.pv{color:#a8d0e4;font-weight:600}
#pact{padding:7px 14px 11px;display:flex;gap:6px}
.pabtn{flex:1;padding:5px 0;border-radius:7px;font-size:.67rem;font-weight:600;
  cursor:pointer;text-align:center;border:1px solid;transition:all .15s}
.pabtn:hover{opacity:.8}
#pclose{position:absolute;top:7px;right:10px;cursor:pointer;color:#4aa0cc;font-size:.85rem}
#pclose:hover{color:#c0e8ff}

/* ── LEGEND ── */
#leg{position:absolute;bottom:40px;left:52px;z-index:20;
  background:rgba(0,6,22,.9);border:1px solid rgba(80,180,255,.18);
  border-radius:10px;padding:9px 13px;min-width:140px}
#leg h4{font-size:.57rem;letter-spacing:.13em;text-transform:uppercase;color:#4aa0cc;margin-bottom:6px}
.lrow{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:.69rem;color:#7a9aaa}
.lrow:last-child{margin-bottom:0}
.ldot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.lc{margin-left:auto;font-weight:700;font-variant-numeric:tabular-nums}

/* ── TICKER ── */
#ticker{position:fixed;bottom:0;left:0;right:0;height:30px;z-index:35;
  background:rgba(0,4,14,.97);border-top:1px solid rgba(80,180,255,.1);
  display:flex;align-items:center;overflow:hidden}
.tlbl{flex-shrink:0;padding:0 10px;font-size:.6rem;letter-spacing:.12em;
  color:#4aa0cc;text-transform:uppercase;border-right:1px solid rgba(80,180,255,.14);
  height:100%;display:flex;align-items:center}
.ttr{flex:1;overflow:hidden;position:relative}
.tin{display:flex;gap:44px;white-space:nowrap;font-size:.62rem;color:#6a98b0;
  animation:sc 30s linear infinite;position:absolute}
@keyframes sc{0%{transform:translateX(100vw)}100%{transform:translateX(-200%)}}
.ti{display:flex;align-items:center;gap:4px}
.tdo{width:4px;height:4px;border-radius:50%}

/* ── LOADING ── */
#ldov{position:fixed;inset:0;top:50px;background:#060d1a;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:50;transition:opacity .5s}
#ldov.out{opacity:0;pointer-events:none}
.ring{width:44px;height:44px;border:2px solid rgba(80,180,255,.12);border-top-color:#4aa0cc;
  border-radius:50%;animation:spin .85s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
#ldov p{color:#4aa0cc;font-size:.75rem;letter-spacing:.1em}
#ldprog{margin-top:8px;font-size:.62rem;color:rgba(80,140,180,.5)}

/* ── CROSSHAIR CENTER ── */
#crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;z-index:5;opacity:.22}

/* City labels */
.citypin{position:absolute;pointer-events:none;transform:translate(-50%,-100%);
  font-size:.55rem;font-weight:600;color:rgba(220,240,255,.75);
  text-shadow:0 0 6px rgba(0,0,0,.8),0 0 12px rgba(0,0,0,.6);
  white-space:nowrap;z-index:8;letter-spacing:.03em}
.citypin::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);
  width:3px;height:3px;border-radius:50%;background:rgba(200,220,255,.6)}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="bar">
  <div id="bartitle">🗺 World — Risk Map</div>
  <div id="styletabs">
    <button class="stab on" onclick="setStyle('osm')"  id="s-osm">🗺 Street</button>
    <button class="stab"    onclick="setStyle('dark')"  id="s-dark">🌙 Dark</button>
    <button class="stab"    onclick="setStyle('topo')"  id="s-topo">🏔 Topo</button>
    <button class="stab"    onclick="setStyle('3d')"    id="s-3d">🏙 3D</button>
  </div>
  <div id="searchbar">
    <input id="sinput" type="text" placeholder="Search city or coordinates…" autocomplete="off"/>
    <button class="btn g" onclick="doSearch()">Go</button>
    <button class="btn r" onclick="tryClose()">✕</button>
  </div>
</div>

<!-- MAP -->
<div id="mapwrap">
  <canvas id="mc"></canvas>

  <!-- zoom controls -->
  <div id="zbtns">
    <button class="zbtn" onclick="zoom(1)" title="Zoom in">+</button>
    <button class="zbtn" onclick="zoom(-1)" title="Zoom out">−</button>
    <button class="zbtn" onclick="resetView()" title="Reset view" style="font-size:.7rem">⌂</button>
  </div>

  <!-- crosshair -->
  <div id="crosshair">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(80,180,255,.8)" stroke-width="1">
      <circle cx="12" cy="12" r="5"/><line x1="12" y1="0" x2="12" y2="7"/><line x1="12" y1="17" x2="12" y2="24"/>
      <line x1="0" y1="12" x2="7" y2="12"/><line x1="17" y1="12" x2="24" y2="12"/>
    </svg>
  </div>

  <!-- risk dot layer (absolute positioned divs) -->
  <div id="dotlayer" style="position:absolute;inset:0;pointer-events:none;overflow:hidden"></div>

  <!-- city label layer -->
  <div id="citylayer" style="position:absolute;inset:0;pointer-events:none;overflow:hidden"></div>

  <!-- popup -->
  <div id="popup">
    <span id="pop-close" onclick="closePopup()">✕</span>
    <div id="pop-risk"></div>
    <div id="pop-loc"></div>
    <div id="pop-stats"></div>
    <div id="pop-btns"></div>
  </div>

  <!-- side panel -->
  <div id="panel">
    <span id="pclose" onclick="document.getElementById('panel').style.display='none'">✕</span>
    <div id="ph">
      <div id="pbadge"></div>
      <div id="pname">—</div>
      <div id="pcoord">—</div>
    </div>
    <div id="pbody">
      <div class="pr"><span class="pk">Temperature</span><span class="pv" id="ptemp">—</span></div>
      <div class="pr"><span class="pk">Wind Speed</span><span class="pv" id="pwind">—</span></div>
      <div class="pr"><span class="pk">Visibility</span><span class="pv" id="pvis">—</span></div>
      <div class="pr"><span class="pk">Road Type</span><span class="pv" id="proad">—</span></div>
      <div class="pr"><span class="pk">Risk Score</span><span class="pv" id="pscore">—</span></div>
    </div>
    <div id="pact">
      <button class="pabtn" style="background:rgba(80,180,255,.16);border-color:rgba(80,180,255,.4);color:#a0ccec" onclick="zoom3DCity()">🏙 Zoom 3D</button>
      <button class="pabtn" style="background:rgba(80,200,130,.13);border-color:rgba(80,200,130,.35);color:#48cc88" onclick="openOSM()">🔗 Open OSM</button>
    </div>
  </div>

  <!-- legend -->
  <div id="leg">
    <h4>Risk Dots</h4>
    <div class="lrow"><div class="ldot" style="background:#ff3366;box-shadow:0 0 5px #ff3366"></div>High<span class="lc" style="color:#ff3366" id="lh">0</span></div>
    <div class="lrow"><div class="ldot" style="background:#ffaa00;box-shadow:0 0 5px #ffaa00"></div>Medium<span class="lc" style="color:#ffaa00" id="lm">0</span></div>
    <div class="lrow"><div class="ldot" style="background:#22ff88;box-shadow:0 0 5px #22ff88"></div>Low<span class="lc" style="color:#22ff88" id="ll">0</span></div>
  </div>

  <div id="attr">© <a href="https://www.openstreetmap.org/copyright" target="_blank">OpenStreetMap</a> contributors</div>
</div>

<!-- ticker -->
<div id="ticker">
  <div class="tlbl">Live Feed</div>
  <div class="ttr"><div class="tin" id="tin">Loading…</div></div>
</div>

<!-- loading -->
<div id="ldov">
  <div class="ring"></div>
  <p id="ldtxt">LOADING MAP…</p>
  <div id="ldprog"></div>
</div>

<script>
'use strict';
/* ═══════════════════════════════════════════════════════
   SELF-CONTAINED TILE MAP — No external libraries needed
   Uses native Canvas API + fetch() for OSM tiles
   ═══════════════════════════════════════════════════════ */

const RCOL={HIGH:'#ff3366',MEDIUM:'#ffaa00',LOW:'#22ff88'};
const RNAME={HIGH:'🔴 HIGH RISK',MEDIUM:'🟡 MEDIUM RISK',LOW:'🟢 LOW RISK'};
const ROADS=['Highway','Urban Road','Intersection','Freeway','Rural Road','Bridge','Ring Road','Expressway','Boulevard','Avenue'];

// Load country data from sessionStorage (set by globe on click)
let CTY=null;
try{const s=sessionStorage.getItem('mapCountry');if(s)CTY=JSON.parse(s);}catch(e){}
if(!CTY)CTY={
  name:'World',flag:'🌍',lat:20,lng:0,mapZ:2,risk:'MEDIUM',
  cities:[
    {n:'New York',lat:40.71,lng:-74.01},{n:'London',lat:51.51,lng:-0.13},
    {n:'Tokyo',lat:35.69,lng:139.69},{n:'Mumbai',lat:19.08,lng:72.88},
    {n:'São Paulo',lat:-23.55,lng:-46.63},{n:'Cairo',lat:30.06,lng:31.24},
    {n:'Lagos',lat:6.52,lng:3.38},{n:'Beijing',lat:39.9,lng:116.4},
    {n:'Moscow',lat:55.75,lng:37.62},{n:'Jakarta',lat:-6.21,lng:106.85},
    {n:'Los Angeles',lat:34.05,lng:-118.24},{n:'Dubai',lat:25.2,lng:55.27},
    {n:'Nairobi',lat:-1.29,lng:36.82},{n:'Bangkok',lat:13.75,lng:100.52},
    {n:'Karachi',lat:24.86,lng:67.01},{n:'Istanbul',lat:41.01,lng:28.98},
  ]
};

document.getElementById('bartitle').textContent=`🗺 ${CTY.flag} ${CTY.name} — Risk Map`;
document.getElementById('ldtxt').textContent=`LOADING ${CTY.name.toUpperCase()} MAP…`;

/* ── Tile map engine ── */
const canvas=document.getElementById('mc');
const ctx=canvas.getContext('2d');
const wrap=document.getElementById('mapwrap');

// Tile sources (no API key needed)
const TILE_SRCS={
  osm: (z,x,y)=>`https://tile.openstreetmap.org/${z}/${x}/${y}.png`,
  dark:(z,x,y)=>`https://tiles.stadiamaps.com/tiles/alidade_smooth_dark/${z}/${x}/${y}.png`,
  topo:(z,x,y)=>`https://tile.opentopomap.org/${z}/${x}/${y}.png`,
  '3d': (z,x,y)=>`https://tile.openstreetmap.org/${z}/${x}/${y}.png`,
};
let tileStyle='osm';

// Map state
let Z=CTY.mapZ||5;     // zoom level 1–18
let CX=CTY.lng;        // center longitude
let CY=CTY.lat;        // center latitude
let W=0,H=0;           // canvas size
const TILE=256;        // tile size px

// Tile cache
const tileCache=new Map();
const tileImg=new Map(); // zoom_x_y → Image

function latToMerc(lat){return Math.log(Math.tan(Math.PI/4+lat*Math.PI/360));}
function mercToLat(m){return(2*Math.atan(Math.exp(m))-Math.PI/2)*180/Math.PI;}
function lngToTileX(lng,z){return(lng+180)/360*Math.pow(2,z);}
function latToTileY(lat,z){const n=Math.pow(2,z);return(1-(latToMerc(lat)/Math.PI))/2*n;}

// Convert tile coords to canvas px
function tileToPx(tx,ty){
  const scale=TILE;
  const cx=lngToTileX(CX,Z),cy=latToTileY(CY,Z);
  return[(tx-cx)*scale+W/2,(ty-cy)*scale+H/2];}

// Convert canvas px to lat/lng
function pxToLL(px,py){
  const cx=lngToTileX(CX,Z),cy=latToTileY(CY,Z);
  const tx=cx+(px-W/2)/TILE,ty=cy+(py-H/2)/TILE;
  const lng=tx/Math.pow(2,Z)*360-180;
  const n=Math.PI-2*Math.PI*ty/Math.pow(2,Z);
  const lat=mercToLat(Math.PI/2-Math.atan(Math.sinh(n))*0+n);
  // Correct formula:
  const lat2=(180/Math.PI)*Math.atan(Math.sinh(Math.PI*(1-2*ty/Math.pow(2,Z))));
  return{lat:lat2,lng};}

// Convert lat/lng to canvas px
function llToPx(lat,lng){
  const cx=lngToTileX(CX,Z),cy=latToTileY(CY,Z);
  const tx=lngToTileX(lng,Z),ty=latToTileY(lat,Z);
  return{x:(tx-cx)*TILE+W/2,y:(ty-cy)*TILE+H/2};}

/* Load a tile image with cache */
function getTile(z,tx,ty,cb){
  const key=`${z}_${tx}_${ty}`;
  if(tileImg.has(key)){cb(tileImg.get(key));return;}
  if(tileCache.has(key)){return;} // already fetching
  tileCache.set(key,true);
  const url=TILE_SRCS[tileStyle](z,tx,ty);
  const img=new Image();
  img.crossOrigin='anonymous';
  img.onload=()=>{tileImg.set(key,img);cb(img);};
  img.onerror=()=>{tileCache.delete(key);};
  img.src=url;
}

/* Draw all visible tiles */
let animFrame=null;
function drawMap(){
  if(animFrame)return;
  animFrame=requestAnimationFrame(()=>{animFrame=null;_draw();});}

function _draw(){
  resize();
  ctx.clearRect(0,0,W,H);

  // Dark background
  ctx.fillStyle='#070f1e';ctx.fillRect(0,0,W,H);

  const n=Math.pow(2,Z);
  const cx=lngToTileX(CX,Z),cy=latToTileY(CY,Z);
  const x0=Math.floor(cx-W/2/TILE-1),x1=Math.ceil(cx+W/2/TILE+1);
  const y0=Math.floor(cy-H/2/TILE-1),y1=Math.ceil(cy+H/2/TILE+1);

  let loaded=0,total=0;
  for(let tx=x0;tx<=x1;tx++){
    for(let ty=Math.max(0,y0);ty<=Math.min(n-1,y1);ty++){
      total++;
      const px=(tx-cx)*TILE+W/2,py=(ty-cy)*TILE+H/2;
      const wtx=((tx%n)+n)%n; // wrap
      getTile(Z,wtx,ty,(img)=>{
        ctx.drawImage(img,Math.round(px),Math.round(py),TILE,TILE);
        loaded++;
        if(loaded===total)applyStyle();
        else drawMap();});
      // Draw placeholder
      const key=`${Z}_${wtx}_${ty}`;
      if(!tileImg.has(key)){ctx.fillStyle='#0a1628';ctx.fillRect(Math.round(px),Math.round(py),TILE,TILE);}
      else{ctx.drawImage(tileImg.get(key),Math.round(px),Math.round(py),TILE,TILE);}
    }
  }

  applyStyle();
  updateDots();
  updateCityPins();
}

function applyStyle(){
  // Dark overlay for dark/3d mode
  if(tileStyle==='dark'||tileStyle==='3d'){
    ctx.fillStyle='rgba(0,8,22,.52)';ctx.fillRect(0,0,W,H);}
  else if(tileStyle==='topo'){
    ctx.fillStyle='rgba(0,6,14,.18)';ctx.fillRect(0,0,W,H);}
  // Grid lines at low zoom
  if(Z<6){
    ctx.save();ctx.strokeStyle='rgba(80,180,255,.08)';ctx.lineWidth=.5;
    for(let la=-75;la<=75;la+=15){
      const{y}=llToPx(la,CX);ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    for(let lo=-165;lo<=180;lo+=15){
      const{x}=llToPx(CY,lo);ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    ctx.restore();
  }
}

function resize(){
  const r=wrap.getBoundingClientRect();
  if(W!==r.width||H!==r.height){W=canvas.width=r.width;H=canvas.height=r.height;}}

/* ── Risk events ── */
function riskFor(p){const r=Math.random();
  return p==='HIGH'?r<.44?'HIGH':r<.72?'MEDIUM':'LOW':
         p==='MEDIUM'?r<.22?'HIGH':r<.56?'MEDIUM':'LOW':
         r<.1?'HIGH':r<.38?'MEDIUM':'LOW';}

const EVTS=[];
const CNT=CTY.name==='World'?80:160;
for(let i=0;i<CNT;i++){
  const hs=CTY.cities[Math.floor(Math.random()*CTY.cities.length)];
  const sp=CTY.name==='World'?6:.6;
  EVTS.push({lat:hs.lat+(Math.random()-.5)*sp,lng:hs.lng+(Math.random()-.5)*sp,
    risk:riskFor(CTY.risk),city:hs.n,
    temp:(Math.random()*55+32).toFixed(1),wind:(Math.random()*40).toFixed(1),
    vis:(Math.random()*9+1).toFixed(1),road:ROADS[Math.floor(Math.random()*ROADS.length)],
    score:(Math.random()*9+1).toFixed(1)});}

// Dot elements pool
const dotEls=[];
let dotsBuilt=false;

function buildDots(){
  if(dotsBuilt)return;dotsBuilt=true;
  const layer=document.getElementById('dotlayer');
  EVTS.forEach((ev,i)=>{
    const el=document.createElement('div');
    el.className='rdot';
    const col=RCOL[ev.risk];
    const sz=ev.risk==='HIGH'?18:ev.risk==='MEDIUM'?13:9;
    const dur=ev.risk==='HIGH'?'1.1s':'1.7s';
    el.style.cssText=`width:${sz}px;height:${sz}px;background:${col};
      box-shadow:0 0 ${sz}px ${col},0 0 ${sz*2}px ${col}55;
      animation:mp ${dur} ease-in-out infinite;pointer-events:auto`;
    // Pulse keyframe (add once)
    if(i===0&&!document.getElementById('mpkf')){
      const s=document.createElement('style');s.id='mpkf';
      s.textContent='@keyframes mp{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:1}50%{transform:translate(-50%,-50%) scale(1.5);opacity:.5}}';
      document.head.appendChild(s);}
    el.addEventListener('click',e=>{e.stopPropagation();showPopup(ev,el);showPanel(ev);});
    layer.appendChild(el);
    dotEls.push(el);});}

function updateDots(){
  if(!dotsBuilt)buildDots();
  const layer=document.getElementById('dotlayer');
  const rect=layer.getBoundingClientRect();
  EVTS.forEach((ev,i)=>{
    const el=dotEls[i];if(!el)return;
    const{x,y}=llToPx(ev.lat,ev.lng);
    if(x<-20||x>W+20||y<-20||y>H+20){el.style.display='none';return;}
    el.style.display='block';el.style.left=x+'px';el.style.top=y+'px';});}

/* City pins */
const cityPinEls={};
function updateCityPins(){
  const layer=document.getElementById('citylayer');
  if(Z<6){Object.values(cityPinEls).forEach(e=>e.style.display='none');return;}
  CTY.cities.forEach(c=>{
    const{x,y}=llToPx(c.lat,c.lng);
    if(!cityPinEls[c.n]){
      const el=document.createElement('div');el.className='citypin';
      el.textContent=c.n;layer.appendChild(el);cityPinEls[c.n]=el;}
    const el=cityPinEls[c.n];
    if(x<0||x>W||y<0||y>H){el.style.display='none';return;}
    el.style.display='block';el.style.left=x+'px';el.style.top=y+'px';});}

/* Update legend counts */
function updateLegend(){
  document.getElementById('lh').textContent=EVTS.filter(e=>e.risk==='HIGH').length;
  document.getElementById('lm').textContent=EVTS.filter(e=>e.risk==='MEDIUM').length;
  document.getElementById('ll').textContent=EVTS.filter(e=>e.risk==='LOW').length;}
updateLegend();

/* ── Map controls ── */
// Drag pan
let drag={on:false,lx:0,ly:0};
wrap.addEventListener('mousedown',e=>{if(e.target.closest('.rdot,.pbtn,.pabtn,.btn,.zbtn,#popup,#panel,#leg'))return;
  drag={on:true,lx:e.clientX,ly:e.clientY};});
window.addEventListener('mouseup',()=>{drag.on=false;});
window.addEventListener('mousemove',e=>{
  if(!drag.on)return;
  const dx=e.clientX-drag.lx,dy=e.clientY-drag.ly;
  drag.lx=e.clientX;drag.ly=e.clientY;
  const n=Math.pow(2,Z);
  CX-=dx/TILE/n*360;
  const cy=latToTileY(CY,Z);
  const newTY=cy-dy/TILE;
  CY=mercToLat(Math.PI*(1-2*newTY/n));
  CX=((CX+180)%360+360)%360-180;
  CY=Math.max(-85,Math.min(85,CY));
  drawMap();});

// Touch pan
let touch={on:false,lx:0,ly:0,dist:0};
wrap.addEventListener('touchstart',e=>{if(e.touches.length===1){touch={on:true,lx:e.touches[0].clientX,ly:e.touches[0].clientY,dist:0};}
  else if(e.touches.length===2){touch.dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}},{passive:true});
wrap.addEventListener('touchmove',e=>{
  if(e.touches.length===1&&touch.on){
    const dx=e.touches[0].clientX-touch.lx,dy=e.touches[0].clientY-touch.ly;
    touch.lx=e.touches[0].clientX;touch.ly=e.touches[0].clientY;
    const n=Math.pow(2,Z);CX-=dx/TILE/n*360;
    const cy2=latToTileY(CY,Z);CY=mercToLat(Math.PI*(1-2*(cy2-dy/TILE)/n));
    CY=Math.max(-85,Math.min(85,CY));drawMap();}
  else if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    if(touch.dist){const dz=Math.log2(d/touch.dist);Z=Math.max(1,Math.min(18,Z+dz));tileImg.clear();tileCache.clear();}
    touch.dist=d;drawMap();}},{passive:true});
wrap.addEventListener('touchend',()=>{touch.on=false;});

// Scroll zoom
wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const oldZ=Z;
  Z=Math.max(1,Math.min(18,Z-(e.deltaY>0?1:-1)));
  if(Z!==oldZ){tileImg.clear();tileCache.clear();drawMap();}},{passive:false});

// Click on map (not dot)
wrap.addEventListener('click',e=>{
  if(e.target.closest('.rdot,.pbtn,.pabtn,.zbtn,.btn,#popup,#panel,#leg,#zbtns'))return;
  const r=wrap.getBoundingClientRect();
  const{lat,lng}=pxToLL(e.clientX-r.left,e.clientY-r.top);
  const near=findNearest(lat,lng);
  if(near&&dist(near.lat,near.lng,lat,lng)<0.3)return;
  showPanel({lat,lng,risk:'MEDIUM',city:coordStr(lat,lng),
    temp:(Math.random()*55+32).toFixed(1),wind:(Math.random()*40).toFixed(1),
    vis:(Math.random()*9+1).toFixed(1),road:ROADS[Math.floor(Math.random()*ROADS.length)],
    score:(Math.random()*9+1).toFixed(1)});});

function zoom(dir){Z=Math.max(1,Math.min(18,Z+dir));tileImg.clear();tileCache.clear();drawMap();}
function resetView(){Z=CTY.mapZ||5;CX=CTY.lng;CY=CTY.lat;tileImg.clear();tileCache.clear();drawMap();}
window.zoom=zoom;window.resetView=resetView;

function dist(a,b,c,d){return Math.sqrt((a-c)**2+(b-d)**2);}
function findNearest(lat,lng){let b=null,bd=99;
  EVTS.forEach(e=>{const d=dist(e.lat,e.lng,lat,lng);if(d<bd){bd=d;b=e;}});return b;}
function coordStr(lat,lng){return`${Math.abs(lat).toFixed(3)}°${lat>=0?'N':'S'} ${Math.abs(lng).toFixed(3)}°${lng>=0?'E':'W'}`;}

/* Style switcher — clears tile cache and redraws */
function setStyle(s){
  tileStyle=s;
  document.querySelectorAll('.stab').forEach(t=>t.classList.remove('on'));
  const tb=document.getElementById('s-'+s);if(tb)tb.classList.add('on');
  tileImg.clear();tileCache.clear();
  if(s==='3d'){Z=Math.max(Z,14);} // 3D = zoom in for building detail
  drawMap();}
window.setStyle=setStyle;

/* ── Popup ── */
let curEv=null;
function showPopup(ev,anchorEl){
  curEv=ev;
  const col=RCOL[ev.risk];
  document.getElementById('pop-risk').textContent=RNAME[ev.risk];
  document.getElementById('pop-risk').style.color=col;
  document.getElementById('pop-loc').textContent=(ev.city||coordStr(ev.lat,ev.lng))+' · '+coordStr(ev.lat,ev.lng);
  document.getElementById('pop-stats').innerHTML=`🌡 ${ev.temp}°F &nbsp; 💨 ${ev.wind} mph &nbsp; 👁 ${ev.vis} mi<br>🛣 ${ev.road} &nbsp;·&nbsp; ⚠️ Score: ${ev.score}/10`;
  document.getElementById('pop-btns').innerHTML=
    `<button class="pbtn" style="background:rgba(80,180,255,.16);border-color:rgba(80,180,255,.4);color:#a0ccec" onclick="zoom3DCity()">🏙 3D Zoom</button>
     <button class="pbtn" style="background:rgba(80,200,130,.13);border-color:rgba(80,200,130,.35);color:#48cc88" onclick="openOSM()">🔗 OSM</button>`;
  // Position popup near dot
  const p=document.getElementById('popup');p.style.display='block';
  const{x,y}=llToPx(ev.lat,ev.lng);
  p.style.left=Math.min(x+18,W-280)+'px';
  p.style.top=Math.max(y-120,4)+'px';}
function closePopup(){document.getElementById('popup').style.display='none';}
window.closePopup=closePopup;

/* ── Panel ── */
function showPanel(ev){
  curEv=ev;
  const col=RCOL[ev.risk||'MEDIUM'];
  const bs={HIGH:'rgba(255,51,102,.18)',MEDIUM:'rgba(255,170,0,.18)',LOW:'rgba(34,255,136,.13)'};
  const bc={HIGH:'#ff3366',MEDIUM:'#ffaa00',LOW:'#22ff88'};
  const badge=document.getElementById('pbadge');
  badge.textContent=RNAME[ev.risk||'MEDIUM'];
  badge.style.background=bs[ev.risk||'MEDIUM'];
  badge.style.border=`1px solid ${bc[ev.risk||'MEDIUM']}`;
  badge.style.color=bc[ev.risk||'MEDIUM'];
  document.getElementById('pname').textContent=ev.city||coordStr(ev.lat,ev.lng);
  document.getElementById('pcoord').textContent=coordStr(ev.lat,ev.lng);
  document.getElementById('ptemp').textContent=`${ev.temp}°F`;
  document.getElementById('pwind').textContent=`${ev.wind} mph`;
  document.getElementById('pvis').textContent=`${ev.vis} mi`;
  document.getElementById('proad').textContent=ev.road||'—';
  document.getElementById('pscore').textContent=`${ev.score||'—'} / 10`;
  document.getElementById('panel').style.display='block';}

/* Actions */
function zoom3DCity(){
  if(!curEv)return;
  CX=curEv.lng;CY=curEv.lat;Z=16;
  tileImg.clear();tileCache.clear();drawMap();
  setTimeout(()=>setStyle('3d'),200);}
function openOSM(){
  if(!curEv)return;
  window.open(`https://www.openstreetmap.org/?mlat=${curEv.lat}&mlon=${curEv.lng}#map=16/${curEv.lat}/${curEv.lng}`,'_blank');}
window.zoom3DCity=zoom3DCity;window.openOSM=openOSM;

/* ── Search ── */
async function doSearch(){
  const q=document.getElementById('sinput').value.trim();if(!q)return;
  // Match known city
  const ql=q.toLowerCase();
  const hit=CTY.cities.find(c=>c.n.toLowerCase().includes(ql));
  if(hit){CX=hit.lng;CY=hit.lat;Z=13;tileImg.clear();tileCache.clear();drawMap();return;}
  // Coords? e.g. "28.6,77.2"
  const m=q.match(/^(-?\d+\.?\d*)[,\s]+(-?\d+\.?\d*)$/);
  if(m){CY=+m[1];CX=+m[2];Z=13;tileImg.clear();tileCache.clear();drawMap();return;}
  // Nominatim geocoder
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=1`);
    const d=await r.json();
    if(d&&d[0]){CX=+d[0].lon;CY=+d[0].lat;Z=13;tileImg.clear();tileCache.clear();drawMap();
      document.getElementById('sinput').value=d[0].display_name.split(',')[0];}
    else alert(`"${q}" not found. Try another city name.`);
  }catch(e){
    // If fetch fails (network), just try to pan to known cities
    alert('Search requires internet. Try typing a city from the list.');}}
window.doSearch=doSearch;
document.getElementById('sinput').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});

/* ── Ticker ── */
function refreshTicker(){
  const items=EVTS.filter(e=>e.risk!=='LOW').slice(0,22).map(e=>{const col=RCOL[e.risk];
    return`<span class="ti"><span class="tdo" style="background:${col};box-shadow:0 0 3px ${col}"></span>${e.risk} — ${e.city} · 🌡${e.temp}°F 💨${e.wind}mph 🛣${e.road} ⚠️${e.score}/10</span>`;}).join('');
  document.getElementById('tin').innerHTML=items||`🟢 Monitoring ${CTY.name}…`;}

/* ── Close button ── */
function tryClose(){try{window.close();}catch(e){window.history.back();}}
window.tryClose=tryClose;

/* ── Init ── */
function init(){
  resize();
  drawMap();
  refreshTicker();
  setInterval(refreshTicker,4000);
  // Dismiss loading after first tiles render
  setTimeout(()=>{
    document.getElementById('ldov').classList.add('out');
    setTimeout(()=>{const l=document.getElementById('ldov');if(l)l.remove();},600);},1200);}

window.addEventListener('resize',()=>{tileImg.clear();tileCache.clear();drawMap();});
init();
</script>
